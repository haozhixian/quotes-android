t find out what you are capable of. Then decide who you are.", "cn": "先找出你的能力所在，然后再决定你是谁。"}, {"num": "NO.618", "en": "Love is what you've been through with somebody.", "cn": "爱，就是你和某个人一起经历的一切。"}, {"num": "NO.619", "en": "Whomever you become, whatever you make yourself into, that is who you always were.", "cn": "无论你成为谁，无论你把自己变成了什么，那就是你本来的样子。"}, {"num": "NO.620", "en": "Without self-discipline, success is impossible. Period.", "cn": "缺乏自律，成功便是空谈。毋庸置疑。"}, {"num": "NO.621", "en": "One's destination is never a place, but a new way of seeing things.", "cn": "一个人的目的地永远不是某个地方，而是一种看待事物的新方式。"}, {"num": "NO.622", "en": "The knowledge of the world is only to be acquired in the world, and not in a closet.", "cn": "对世界的了解是在世界中获得的，而不是在储物间里。"}, {"num": "NO.623", "en": "The one thing that doesn't abide by majority rule is a person's conscience.", "cn": "世上唯一不能遵循从众原则的东西，是人的良心。"}, {"num": "NO.624", "en": "Every artist was first an amateur.", "cn": "每个艺术家最初都是一名业余爱好者。"}, {"num": "NO.625", "en": "Live your life as though your every act were to become a universal law.", "cn": "过好你的生活，就像你的每一个行为都将成为一个普遍规律。"}, {"num": "NO.626", "en": "Success is to be measured not so much by the position that one has reached in life as by the obstacles which he has overcome.", "cn": "衡量成功的标准不是看一个人在生活中所处的地位，而是看他所克服的障碍。"}, {"num": "NO.627", "en": "A man is a success if he gets up in the morning and goes to bed at night and in between does what he wants to do.", "cn": "成功的生活就是早上起床，晚上睡觉，白天做自己想做的事情。"}, {"num": "NO.628", "en": "No one can deprive us of our free will.", "cn": "谁也不能剥夺我们自由的意志。"}, {"num": "NO.629", "en": "Plans to protect air and water, wilderness and wildlife are in fact plans to protect man.", "cn": "那些保护空气，水和野生动物的计划，实际上是为了保护人类自己。"}, {"num": "NO.630", "en": "Dads are most ordinary men turned by love into heroes, adventurers story-tellers, and singers of songs.", "cn": "父亲们不过是群普通人，但爱让他们化身英雄、探险家、说书人和歌者。"}, {"num": "NO.631", "en": "Habits gather by unseen degrees, as brooks make rivers, rivers run to the sea.", "cn": "习惯在点滴中慢慢养成，恰似溪流汇成江河，江河奔入大海。"}, {"num": "NO.632", "en": "The farther behind I leave the past, the closer I am to forging my own future.", "cn": "越是放下过往，就越能开创属于自己的未来。"}, {"num": "NO.633", "en": "Anything looked at closely becomes wonderful.", "cn": "在近距离的观察下，任何事物都会显得美妙无比。"}, {"num": "NO.634", "en": "Love is when you are as concerned about someone else's situation as you are about your own.", "cn": "爱就是像关心自己一样去关心别人。"}, {"num": "NO.635", "en": "The most wasted day of all is that on which we have not laughed.", "cn": "没有笑声的一天就是最虚度光阴的一天。"}, {"num": "NO.636", "en": "Only an open heart will allow you to float equally between everyone.", "cn": "唯有一颗坦诚的心才能使你平等地对待每一个人。"}, {"num": "NO.637", "en": "The most important thing in life is to learn how to give out love, and to let it come in.", "cn": "生命中最重要的就是学会给予爱，同时也要学会接受爱。"}, {"num": "NO.638", "en": "You do not write your life with words. You write it with actions.", "cn": "你不是用文字书写你的人生，而是用行动。"}, {"num": "NO.639", "en": "A man is a success if he gets up in the morning and goes to bed at night, and in between does what he wants to do.", "cn": "成功的生活就是早上起床，晚上睡觉，白天做自己想做的事。"}, {"num": "NO.640", "en": "However difficult life may seem, there is always something you can do and succeed at.", "cn": "无论生活看起来多么困难，总有一些你可以做并能获得成功的事情。"}, {"num": "NO.641", "en": "Your life is a reflection of your thoughts. If you change your thinking, you change your life.", "cn": "你的生活反映了你的思维。如果你改变了你的思维，你就改变了你的生活。"}, {"num": "NO.642", "en": "All the adversity I've had in my life, all my troubles and obstacles, have strengthened me.", "cn": "我生命中经历的所有逆境，所有的困难和障碍，都让我变得更强。"}, {"num": "NO.643", "en": "A reader lives a thousand lives before he dies. The man who never reads lives only one.", "cn": "携书如历三千世，无书唯度一平生。"}, {"num": "NO.644", "en": "The minute you think, 'Oh, this is how life is', life finds a way of surprising you.", "cn": "当你想着“哦，生活就是这样的”的时候，生活总会给你带来惊喜。"}, {"num": "NO.645", "en": "I'm not afraid of storms, for I'm learning how to sail my ship.", "cn": "我不惧怕暴风雨，因为我正在学习如何驾驭我的船。"}, {"num": "NO.646", "en": "If everything was perfect, you would never learn and you would never grow.", "cn": "如果一切都是完美的，你就永远学不到东西，你也永远不会成长。"}, {"num": "NO.647", "en": "Wherever there is a human being, there is an opportunity for a kindness.", "cn": "哪里有人，哪里就有善良的机会。"}, {"num": "NO.648", "en": "We are never really happy until we try to brighten the lives of others.", "cn": "除非我们努力照亮别人的生活，否则我们永远不会真正快乐。"}, {"num": "NO.649", "en": "It is one thing to be clever and another to be wise.", "cn": "聪明和智慧是两码事。"}, {"num": "NO.699", "en": "This universe is not outside of you. Look inside yourself; everything that you want, you already are.", "cn": "宇宙并不在你之外。看看自己的内心吧。你想要的一切都已经尽在你身。"}];
