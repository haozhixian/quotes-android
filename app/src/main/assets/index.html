<script>
var INIT_QUOTES = [{"num": "NO.1", "en": "There is more treasure in books than in all the pirate's loot on Treasure Island.", "cn": "书中的宝藏比海盗在金银岛上的所有战利品还要多。"}, {"num": "NO.2", "en": "The only thing I knew how to do was to keep on keeping on like a bird that flew.", "cn": "我唯一会的事情就是像只飞鸟一样继续前进。"}, {"num": "NO.3", "en": "Hope sees the invisible, feels the intangible and achieves the impossible.", "cn": "拥有希望可以看见他人不可见的，感受他人不能觉知的，并且实现那些不可能的事。"}, {"num": "NO.4", "en": "First keep peace with yourself, then you can also bring peace to others.", "cn": "首先让自己保持平和，然后你也可以给别人带来平和。"}, {"num": "NO.5", "en": "A multitude of small delights constitute happiness.", "cn": "幸福就是许多小确幸的总和。"}, {"num": "NO.6", "en": "Knowledge will give you power, but character respect.", "cn": "知识会带给你力量，而品格会带给你他人的尊重。"}, {"num": "NO.7", "en": "Do not look for happiness outside yourself. The awakened seek happiness inside.", "cn": "不要向外寻找快乐，开悟之人在内心寻找幸福。"}, {"num": "NO.8", "en": "It took me 17 years and 114 days to become an overnight success.", "cn": "我花了17年又114天的时间才在一夕之间成功。"}, {"num": "NO.9", "en": "I am not afraid of tomorrow for I have seen yesterday and I love today.", "cn": "我不害怕明天，因为我经历过昨天，又热爱今天。"}, {"num": "NO.10", "en": "We can't all be heroes, because somebody has to sit on the curb and applaud when they go by.", "cn": "我们不可能都成为英雄，总得有人在英雄走过的时候坐在路边鼓掌。"}, {"num": "NO.11", "en": "Youth is happy because it has the capacity to see beauty. Anyone who keeps the ability to see beauty never grows old.", "cn": "青春之欢愉在于发现美的能力。而所有能发现美的人，会永远年轻。"}, {"num": "NO.12", "en": "Every cloud has a silver lining.", "cn": "每朵乌云背后都有一道阳光。"}, {"num": "NO.13", "en": "Don't settle for what life gives you; make life better and build something.", "cn": "不要满足于生活赋予你的，要有所创造，让人生变得更好。"}, {"num": "NO.14", "en": "True self-discovery begins where your comfort zone ends.", "cn": "真正的自我发现，始于你踏出了你的舒适区。"}, {"num": "NO.15", "en": "Life isn't tied with a bow, but it's still a gift.", "cn": "生活没有打上蝴蝶结，但它仍是一份礼物。"}, {"num": "NO.16", "en": "We don't want to tell your dreams, we want to show them.", "cn": "我们不想空谈梦想，只想实现梦想。"}, {"num": "NO.17", "en": "The secret of discipline is motivation. When a man is sufficiently motivated, discipline will take care of itself.", "cn": "自律的关键是动机，当一个人的动力足够时，他自然就能自律。"}, {"num": "NO.18", "en": "To fall in love with yourself is the first secret to happiness.", "cn": "爱上自己是通往幸福的第一奥秘。"}, {"num": "NO.19", "en": "The most beautiful discovery true friends make is that they can grow separately without growing apart.", "cn": "朋友之间最美妙的经历，莫过于成长道路不同，却并不因此生出隔阂。"}, {"num": "NO.20", "en": "To accept ourselves as we are means to value our imperfections as much as our perfections.", "cn": "所谓接受自己，意味着既重视自己的完美，也珍视自己的不完美。"}, {"num": "NO.21", "en": "An animal's eyes have the power to speak a great language.", "cn": "动物的眼睛有一种神奇的力量，诉说着千言万语。"}, {"num": "NO.22", "en": "Let your joy be in your journey — not in some distant goal.", "cn": "让你的喜悦来自旅途中，而非一个遥远的目标。"}, {"num": "NO.23", "en": "A warm smile is the universal language of kindness.", "cn": "温暖的笑容是放之四海而皆准的善意表达。"}, {"num": "NO.24", "en": "Travel and change of place impart new vigor to the mind.", "cn": "新的地方旅行能让思维焕发新的活力。"}, {"num": "NO.25", "en": "Do you want to meet the love of your life? Look in the mirror.", "cn": "想见见你的毕生所爱吗？看看镜中吧。"}, {"num": "NO.26", "en": "Until you start believing in yourself, you ain't gonna have a life.", "cn": "直到你开始相信自己，你的人生才真正开始。"}, {"num": "NO.27", "en": "A poet is a man who puts up a ladder to a star and climbs it while playing a violin.", "cn": "诗人就是对着星空搭起天梯，然后边向上爬边拉小提琴。"}, {"num": "NO.28", "en": "Don't tell me the sky's the limit when there are footprints on the moon.", "cn": "别对我说天空就是极限，毕竟连月球上都有人类的脚印。"}, {"num": "NO.29", "en": "The best day of your life is the one on which you decide your life is your own.", "cn": "你生命中最美好的一天，就是你决定让你的人生属于你自己的那一天。"}, {"num": "NO.30", "en": "Everything you have never give up will belong to you one day.", "cn": "你从未放弃的一切事物总有一天会属于你。"}, {"num": "NO.31", "en": "Everything you have ever wanted is on the other side of fear.", "cn": "你想要的一切，都在恐惧的彼端。"}, {"num": "NO.32", "en": "You may forget with whom you laughed, but you will never forget with whom you wept.", "cn": "你可能会忘记和你一同笑过的人，但是会永远记得和你一同哭过的人。"}, {"num": "NO.33", "en": "Twenty years from now you will be more disappointed by the things that you didn't do than by the ones you did do.", "cn": "二十年后，比起你做过的事，你会更遗憾于那些你没有去做的事情。"}, {"num": "NO.34", "en": "When life is sweet, say thank you and celebrate. And when life is bitter, say thank you and grow.", "cn": "日子愉快时，说声谢谢，庆贺吧；日子苦难时，说声谢谢，成长吧。"}, {"num": "NO.35", "en": "Speak your mind even if your voice shakes.", "cn": "哪怕声音会颤抖，也要勇敢说出你的想法。"}, {"num": "NO.36", "en": "There is meaning in every journey that is unknown to the traveler.", "cn": "每段旅行都有不为旅行者所知的意义。"}, {"num": "NO.37", "en": "Rivers know this: there is no hurry. We shall get there some day.", "cn": "河流知道这一点：无需匆忙。我们终有一日会抵达。"}, {"num": "NO.38", "en": "Real generosity toward the future lies in giving all to the present.", "cn": "将一切奉献给当下，就是对未来真正的慷慨。"}, {"num": "NO.39", "en": "Art doesn't have to do anything. It just has to be there for the fierce pleasure we take in doing it.", "cn": "艺术不需要做什么。在我们从事艺术时，能让人感受到强烈的愉悦就够了。"}, {"num": "NO.40", "en": "Life is a sum of all your choices. So, what are you doing today?", "cn": "生活就是你所有选择的总和。那么，你今天要做什么呢？"}, {"num": "NO.41", "en": "Without deviation from the norm, progress is not possible.", "cn": "不偏离常规，就无法取得进步。"}, {"num": "NO.42", "en": "Happiness lies in the joy of achievement and the thrill of creative effort.", "cn": "幸福来源于收获时的欢乐和创作时的激动。"}, {"num": "NO.43", "en": "The morning, which is the most memorable season of the day, is the awakening hour.", "cn": "在一天之中，清晨最值得怀念和纪念，这是一段让万物醒悟的光阴。"}, {"num": "NO.44", "en": "Either you run the day or the day runs you.", "cn": "要么你主宰生活，要么让生活主宰你。"}, {"num": "NO.45", "en": "It's good to set limits for oneself, but there comes a moment when we must destroy what we have constructed.", "cn": "为自己设限是不错，不过有时候我们必须打破自己一手建立的一切。"}, {"num": "NO.46", "en": "Even if you're on the right track, you'll get run over if you just sit here.", "cn": "即使你刚好处于正规路径上，如果你只坐那里的话，还是会被撞翻。"}, {"num": "NO.47", "en": "Everybody's got a job to do, and I do mine as best I can.", "cn": "每个人都有自己的事情要做，我会竭尽全力把自己的事情做好。"}, {"num": "NO.48", "en": "They say when you meet the love of your life, time stops, and that's true.", "cn": "人们说当你遇上你的挚爱，时间便会停止，事实的确如此。"}, {"num": "NO.49", "en": "A clear vision, backed by definite plans, gives you a tremendous feeling of confidence and personal power.", "cn": "一个清晰的愿景，加以明确计划的支持，会给你极大的信心和个人力量。"}, {"num": "NO.50", "en": "I like to feel his eyes on me when I look away.", "cn": "我喜欢当我看向别处时，他的目光停留在我身上的感觉。"}, {"num": "NO.51", "en": "You never know how far you can go unless you run.", "cn": "你如果不跑起来，就永远不知道自己能走多远。"}, {"num": "NO.52", "en": "If you want the best the world has to offer, offer the world your best.", "cn": "若想得到世界最好的东西，先向世界展现最好的你。"}, {"num": "NO.53", "en": "Fortune favors the bold.", "cn": "天助勇者。"}, {"num": "NO.54", "en": "Gratitude makes sense of our past, brings peace for today, and creates a vision for tomorrow.", "cn": "感恩之心赋予过去意义，为当下带来平静，为未来创造愿景。"}, {"num": "NO.55", "en": "Life is a long lesson in humility.", "cn": "人生是一门漫长的学习谦卑的课。"}, {"num": "NO.56", "en": "There cannot be a crisis next week. My schedule is already full.", "cn": "下周不可能有危机。我的日程早就排满了。"}, {"num": "NO.57", "en": "Money is like a sixth sense without which you cannot make a complete use of the other five.", "cn": "金钱就像是人的第六感，没有它你就无法完整地使用其它五个感官。"}, {"num": "NO.58", "en": "Everyone is born with genius, but most people only keep it a few minutes.", "cn": "每个人生来都是天才，但大多数人只把天资保留了几分钟。"}, {"num": "NO.59", "en": "You must first have a lot of patience to learn to have patience.", "cn": "你首先得耐下心来，才能学会有耐心。"}, {"num": "NO.60", "en": "We're losing all this daylight but soon the moon's gonna rise.", "cn": "虽然白日将尽，但有一轮新月正在冉冉高升。"}, {"num": "NO.61", "en": "Education is a progressive discovery of our own ignorance.", "cn": "教育是一个逐步发现自己无知的过程。"}, {"num": "NO.62", "en": "Never judge a book by its movies.", "cn": "永远不要通过由书改编的电影来评判这本书。"}, {"num": "NO.63", "en": "The best way to predict the future is to invent it.", "cn": "预知未来最好的方式是创造未来。"}, {"num": "NO.64", "en": "Man invented language to satisfy his deep need to complain.", "cn": "人类发明语言是为了满足他们内心深处对抱怨的需求。"}, {"num": "NO.65", "en": "This universe is not outside of you. Look inside yourself; everything that you want, you already are.", "cn": "宇宙并不在你之外。看看自己的内心吧。你想要的一切都已经尽在你身。"}, {"num": "NO.66", "en": "Life isn't about finding yourself. Life is about creating yourself.", "cn": "生命的意义不在于发现你自己，而在于创造你自己。"}, {"num": "NO.67", "en": "We are young. So let's set the world on fire. We can burn brighter than the sun.", "cn": "我们是青年，让我们点亮世界，释放生命，胜过太阳。"}, {"num": "NO.68", "en": "If there's one thing to be taught, it's dreams are made to be caught.", "cn": "唯有一件事值得谨记，有梦想就要奋力去追逐。"}, {"num": "NO.69", "en": "Reading gives us someplace to go when we have to stay where we are.", "cn": "当我们困在原地时，阅读可以带我们去遨游。"}, {"num": "NO.70", "en": "In any case you mustn't confuse a single failure with a final defeat.", "cn": "永远不要把一次错误与最终失败混为一谈。"}, {"num": "NO.71", "en": "I took my bruises, took my lumps. Fell down and I got right back up.", "cn": "我身上带着淤青和肿块，摔倒了也要立刻爬起来。"}, {"num": "NO.72", "en": "The whole secret of a successful life is to find out what is one's destiny to do, and then do it.", "cn": "拥有成功的人生，秘诀在于发现自己此生该做什么，然后付诸行动。"}, {"num": "NO.73", "en": "It's kind of fun to do the impossible.", "cn": "做不可能的事情还挺有趣的。"}, {"num": "NO.74", "en": "It isn't where you came from. It's where you're going that counts.", "cn": "起点并不重要，重要的是，你要去向何方。"}, {"num": "NO.75", "en": "Intelligence is the ability to adapt to change.", "cn": "智慧就是适应变化的能力。"}, {"num": "NO.76", "en": "You're not obligated to win. You're obligated to keep trying.", "cn": "你不一定要获胜，但是你必须不断尝试。"}, {"num": "NO.77", "en": "A life spent making mistakes is not only more honorable, but more useful than a life spent doing nothing.", "cn": "比起无所事事，会犯错的人生不仅更光荣，也更有意义。"}, {"num": "NO.78", "en": "Do not go where the path may lead; go instead where there is no path and leave a trail.", "cn": "别沿着既定的路径走，要去开辟自己的路，留下自己的足迹。"}, {"num": "NO.79", "en": "The time spent with you allowed me to feel again.", "cn": "与你共度的时光，让我重新苏醒。"}, {"num": "NO.80", "en": "The only real failure is the failure to try and the measure of success is how we cope with disappointment.", "cn": "唯一真正的失败是放弃尝试；衡量成功的标准是我们如何应对失望。"}, {"num": "NO.81", "en": "The worst loneliness is not to be comfortable with yourself.", "cn": "最糟糕的孤独是无法舒适的与自己相处。"}, {"num": "NO.82", "en": "We have to do the best we are capable of. This is our sacred human responsibility.", "cn": "我们必须尽力而为，这是我们生而为人的神圣责任。"}, {"num": "NO.83", "en": "Forgiveness does not change the past, but it does enlarge the future.", "cn": "宽恕无法改变过去，却能拓宽未来。"}, {"num": "NO.84", "en": "I have found that if you love life, life will love you back.", "cn": "我发现，如果你爱生活，生活也会用爱回报你。"}, {"num": "NO.85", "en": "They can because they think they can.", "cn": "他们可以，是因为他们相信自己可以。"}, {"num": "NO.86", "en": "There is no friend as loyal as a book.", "cn": "好书如挚友，情谊永不渝。"}, {"num": "NO.87", "en": "You have every right to a beautiful life.", "cn": "你完全有权利拥有一个美好的人生。"}, {"num": "NO.88", "en": "Patience is the companion of wisdom.", "cn": "耐心总与智慧相伴。"}, {"num": "NO.89", "en": "It is your determination and persistence that will make you a successful person.", "cn": "让你成功的，是你的决心和毅力。"}, {"num": "NO.90", "en": "One of the most sincere forms of respect is actually listening to what another has to say.", "cn": "表达尊重的最真诚的方式之一就是真正倾听别人说的话。"}, {"num": "NO.91", "en": "If you have good thoughts they will shine out of your face like sunbeams and you will always look lovely.", "cn": "你若思想美好，面容就会如阳光般灿烂，看上去永远可爱迷人。"}, {"num": "NO.92", "en": "The human race has one really effective weapon, and that is laughter.", "cn": "欢笑是人类强有力的武器。"}, {"num": "NO.93", "en": "Learn to let go and be clear of where you really want to head for.", "cn": "学会放手，同时也要弄清楚自己的真正所爱。"}, {"num": "NO.94", "en": "Don't criticize what you can't understand.", "cn": "不懂的，不要随意批判。"}, {"num": "NO.95", "en": "You only get one shot; do not miss your chance to blow.", "cn": "机会只有一次，不要错过。"}, {"num": "NO.96", "en": "Believe in every dream that you got, you only living once.", "cn": "你只活一次，要相信属于自己的每一个梦想。"}, {"num": "NO.97", "en": "Each time you happen to me all over again.", "cn": "每次与你相逢，心动一如初见。"}, {"num": "NO.98", "en": "That's what I consider true generosity. You give your all, and yet you always feel as if it costs you nothing.", "cn": "我认为，真正的慷慨是奉献所有，却仍觉得没有损失分毫。"}, {"num": "NO.99", "en": "Wrinkles should merely indicate where smiles have been.", "cn": "皱纹只是微笑留下的痕迹。"}, {"num": "NO.100", "en": "You do not find the happy life. You make it.", "cn": "幸福不是刻意的寻找，而是用心的经营。"}, {"num": "NO.101", "en": "Be determined. Instead of intending to just try, do it.", "cn": "要坚定，凡事要抱着拼一把而非试一下的心态。"}, {"num": "NO.102", "en": "The best way to find out if you can trust somebody is to trust them.", "cn": "确认一个人是否可信，最好的办法是信任他们。"}, {"num": "NO.103", "en": "Give every day the chance to become the most beautiful day of your life.", "cn": "把每天都过成你生命中最美好的一天。"}, {"num": "NO.104", "en": "You must do the things you think you cannot do.", "cn": "务必要去尝试你认为不可能的事。"}, {"num": "NO.105", "en": "You should love and take care of yourself because after all, it's your own life.", "cn": "要学会爱自己，照顾自己，毕竟这是你自己的生活呀。"}, {"num": "NO.106", "en": "Motivation comes from working on things we care about.", "cn": "为在意的事情付出努力，动力也随之而来。"}, {"num": "NO.107", "en": "Forgiveness is the fragrance that the violet sheds on the heel that has crushed it.", "cn": "你一脚踩在紫罗兰上，它却把香味留在了你的脚上，这便是宽恕。"}, {"num": "NO.108", "en": "True love comes quietly, without banners or flashing lights.", "cn": "真爱都是悄然降临，既不旗幡招展，也不灯火辉煌。"}, {"num": "NO.109", "en": "You can't build a reputation on what you are going to do.", "cn": "你是无法靠你打算去做的事情树立名声的。"}, {"num": "NO.110", "en": "Only two things are infinite, the universe and human stupidity, and I'm not sure about the former.", "cn": "世界上只有两种东西是无限的：宇宙及人类的愚蠢。而对于前者，我还不太确定。"}, {"num": "NO.111", "en": "While we try to teach our children all about life, our children teach us what life is all about.", "cn": "当我们教会孩子生活的一切时，孩子也教会我们什么是生活的真谛。"}, {"num": "NO.112", "en": "The world is full of willing people, some willing to work, the rest willing to let them.", "cn": "这世上从不缺心甘情愿之人，一部分甘愿埋头实干，剩下的人乐意让他们工作。"}, {"num": "NO.113", "en": "One machine can do the work of fifty ordinary men. No machine can do the work of one extraordinary man.", "cn": "一台机器能干五十个普通人的活，但一个杰出的人的工作没有机器可以做。"}, {"num": "NO.114", "en": "Parents were invented to make children happy by giving them something to ignore.", "cn": "父母的存在，是有意让孩子们忽略一些事情，从而让他们感到快乐。"}, {"num": "NO.115", "en": "Be as simple as you can be. You'll be astonished to see how uncomplicated and happy your life will be.", "cn": "尽量简单做自己，你就会惊奇地发现，生活是如此简单，而且快乐。"}, {"num": "NO.116", "en": "It is not necessary to understand things in order to argue about them.", "cn": "没必要为了争论某些事物，而去理解这些事物。"}, {"num": "NO.117", "en": "Today is your opportunity to build the tomorrow you want.", "cn": "想要创造出你想要的明天，今天就是你的机会。"}, {"num": "NO.118", "en": "I often quote myself. It adds spice to my conversation.", "cn": "我经常引用自己的话，它可以为我的谈话增添点色彩。"}, {"num": "NO.119", "en": "Life wouldn't be worth living if I worried over the future as well as the present.", "cn": "如果我既担心未来又担心现在，那么这样的生活就不值得我去过。"}, {"num": "NO.120", "en": "Education's purpose is to replace an empty mind with an open one.", "cn": "教育的目的是使空洞的大脑变得更开放宽广。"}, {"num": "NO.121", "en": "Self-confidence is the first requisite to great undertakings.", "cn": "自信是成大事的首要条件。"}, {"num": "NO.122", "en": "Nothing is impossible. Some things are just less likely than others.", "cn": "没有什么是不可能的，只是有些事情的可能性比其它的事情小一点而已。"}, {"num": "NO.123", "en": "Fashion is a form of ugliness so intolerable that we have to alter it every six months.", "cn": "时尚是一种无法容忍的丑陋，以至于我们不得不每六个月就得改变它一次。"}, {"num": "NO.124", "en": "The two most important days in your life are the day you are born and the day you find out why.", "cn": "你的生命中最重要的两天，是你出生的那一天和你弄清楚生活意义的那一天。"}, {"num": "NO.125", "en": "Well-timed silence has more eloquence than speech.", "cn": "时机恰当的沉默比话语更有说服力。"}, {"num": "NO.126", "en": "Food is the most primitive form of comfort.", "cn": "食物是最原始的安慰人心的东西。"}, {"num": "NO.127", "en": "Famous remarks are very seldom quoted correctly.", "cn": "名言很少能被正确引用。"}, {"num": "NO.128", "en": "Everyone is necessarily the hero of his own life story.", "cn": "每个人都必定是他们自己生活故事的英雄主角。"}, {"num": "NO.129", "en": "A good novel tells us the truth about its hero; but a bad novel tells us the truth about its author.", "cn": "一本好的小说告诉我们关于主角的种种真相；而一本糟糕的小说告诉我们关于作者自己的种种真相。"}, {"num": "NO.130", "en": "Be careful about reading health books. You may die of a misprint.", "cn": "读那些健康类书籍可得小心，你可能因误刷而丢了性命。"}, {"num": "NO.131", "en": "Never explain — your friends do not need it and your enemies will not believe you anyway.", "cn": "不用解释——你的朋友不需要这样做，而你的敌人怎样也不会相信你。"}, {"num": "NO.132", "en": "When you have eliminated the impossible, whatever remains, however improbable, must be the truth.", "cn": "当你排除掉了所有的不可能时，无论剩下的有多么不可能，都一定是真相。"}, {"num": "NO.133", "en": "Money is better than poverty, if only for financial reasons.", "cn": "如果仅仅从经济原因来考虑的话，钱比贫穷更好。"}, {"num": "NO.134", "en": "Believe you can and you're halfway there.", "cn": "相信自己，那你就成功了一半。"}, {"num": "NO.135", "en": "Do the things you want to do.", "cn": "做你想做的事情。"}, {"num": "NO.136", "en": "The verse of Qu Ping shines as bright as sun and moon, while palaces of Chu vanish like dreams at noon.", "cn": "屈平辞赋悬明月，楚王台榭空山丘。"}, {"num": "NO.137", "en": "A great obstacle to happiness is to expect too much happiness.", "cn": "获得幸福的一大障碍就是对幸福的期望太高。"}, {"num": "NO.138", "en": "Try to be a rainbow in someone's cloud.", "cn": "试着去成为某个人乌云里的一道彩虹吧！"}, {"num": "NO.139", "en": "Change the way you look at things and the things you look at change.", "cn": "改变你看待事物的方式，你所看到的事物也会改变。"}, {"num": "NO.140", "en": "I have failed many times, and that's why I am a success.", "cn": "我失败过很多次，这就是我成功的原因。"}, {"num": "NO.141", "en": "There is an applause superior to that of the multitudes: one's own.", "cn": "有一种掌声，比大众的掌声更优越：那就是你自己给自己鼓的掌。"}, {"num": "NO.142", "en": "Keep a little fire burning; however small, however hidden.", "cn": "让心中的火苗一直燃烧吧，不管那有多微弱，不管藏得有多深。"}, {"num": "NO.143", "en": "I'm not telling you it is going to be easy, I'm telling you it's going to be worth it.", "cn": "我不会告诉你这个过程很容易。我只会说，这一切都是值得的。"}, {"num": "NO.144", "en": "The more we do, the more we can do.", "cn": "我们做的越多，能做的也就越多。"}, {"num": "NO.145", "en": "Whatever is worth doing at all is worth doing well.", "cn": "任何值得做的事，都值得将其做好。"}, {"num": "NO.146", "en": "A positive attitude will have positive results because attitudes are contagious.", "cn": "积极的态度会带来积极的结果，因为态度是具有感染力的。"}, {"num": "NO.147", "en": "Neither abstinence nor excess ever renders man happy.", "cn": "不论是节制还是过度都不能给人带来快乐。"}, {"num": "NO.148", "en": "First I gaze toward the moon, but the moon shines on the ditch.", "cn": "我本将心向明月，奈何明月照沟渠。"}, {"num": "NO.149", "en": "It's not the load that breaks you down, it's the way you carry it.", "cn": "把你压垮的不是压力本身，而是你承受压力的方式。"}, {"num": "NO.150", "en": "You want this life. Those choices are necessary.", "cn": "你想过这样的生活，做出那些选择就是必要的。"}, {"num": "NO.151", "en": "Your time is limited, so don't waste it living someone else's life.", "cn": "你的时间是有限的，所以不要浪费时间去重复别人的生活。"}, {"num": "NO.152", "en": "I think in terms of the day's resolutions, not the years.", "cn": "我思考的是每一天的决意，而不是很多年的。"}, {"num": "NO.153", "en": "There are far, far better things ahead than any we leave behind.", "cn": "比起遗落在身后的，未来还有更好的事物在等着我们。"}, {"num": "NO.154", "en": "I am seeking, I am striving, I am in it with all my heart.", "cn": "我在找寻，我在努力，我会全身心的投入其中。"}, {"num": "NO.155", "en": "You are confined only by the walls you build yourself.", "cn": "限制你的只有你自己筑起的高墙。"}, {"num": "NO.156", "en": "Bills travel through the mail at twice the speed of checks.", "cn": "账单邮寄到来的速度总比支票的速度快得多。"}, {"num": "NO.157", "en": "Many individuals have, like uncut diamonds, shining qualities beneath a rough exterior.", "cn": "很多人像未经雕琢的钻石，在粗糙的表面之下拥有发光的本质。"}, {"num": "NO.158", "en": "At the end of the day, let there be no excuses, no explanations, no regrets.", "cn": "在一天结束的时候，别留下任何借口、解释和悔恨。"}, {"num": "NO.159", "en": "The path to your success is not as fixed and inflexible as you think.", "cn": "成功之路并非你想的那么死板和不可改变。"}, {"num": "NO.160", "en": "It is not because things are difficult that we do not dare; it is because we do not dare that they are difficult.", "cn": "不是因为事情困难，我们才没有勇气去做；而是因为我们没有勇气去做，事情才困难。"}, {"num": "NO.161", "en": "Goodness is the only investment that never fails.", "cn": "善良是唯一不会失败的投资。"}, {"num": "NO.162", "en": "When you finally go back to your old hometown, you find it wasn't the old home you missed but your childhood.", "cn": "当你最终回到你的故乡的时候，你会发现自己思念的不是故乡，而是童年。"}, {"num": "NO.163", "en": "Kites rise highest against the wind, not with it.", "cn": "风筝逆风才能高飞——而不是顺风。"}, {"num": "NO.164", "en": "Difficulties strengthen the mind, as labor does the body.", "cn": "困难能磨练心志，正如劳动能强壮体魄。"}, {"num": "NO.165", "en": "The trees that are slow to grow bear the best fruit.", "cn": "长得慢的树，能结出最好的果实。"}, {"num": "NO.166", "en": "Luck is what you have left over after you give 100 percent.", "cn": "幸运，就是在你付出百分百之后剩下的东西。"}, {"num": "NO.167", "en": "Knowledge speaks, but wisdom listens.", "cn": "知识善于表达，而智慧善于倾听。"}, {"num": "NO.168", "en": "One doesn't discover new lands without consenting to lose sight of the shore for a very long time.", "cn": "不愿意在看不见海岸线的情况下久久漂流，是无法发现新大陆的。"}, {"num": "NO.169", "en": "When something is important enough, you do it even if the odds are not in your favor.", "cn": "当一件事情足够重要时，即使缺乏胜算，你也会去做的。"}, {"num": "NO.170", "en": "Go confidently in the direction of your dreams! Live the life you've imagined.", "cn": "自信地朝着你的梦想前进吧！去过你想要的生活。"}, {"num": "NO.171", "en": "In order to be irreplaceable one must always be different.", "cn": "要想变得无可替代，就必须与众不同。"}, {"num": "NO.172", "en": "Lose an hour in the morning, and you will spend all day looking for it.", "cn": "早上浪费一小时，得用一天的时间来弥补。"}, {"num": "NO.173", "en": "Kindness is always fashionable, and always welcome.", "cn": "善良永不过时，也永远为人们所喜闻乐见。"}, {"num": "NO.174", "en": "Happiness is not a station you arrive at, but a manner of traveling.", "cn": "幸福不是你所抵达的终点，而是一种旅行的方式。"}, {"num": "NO.175", "en": "He who would travel happily must travel light.", "cn": "想要快乐旅行的人必须轻装上阵。"}, {"num": "NO.176", "en": "When a thing is done, it's done. Don't look back. Look forward to your next objective.", "cn": "事情做完了就是做完了。别回头，继续去寻找下一个目标吧！"}, {"num": "NO.177", "en": "We are what we repeatedly do; excellence, then, is not an act but a habit.", "cn": "每天反复做的事情造就了我们，然后你就会发现，优秀不是一种行为，而是一种习惯。"}, {"num": "NO.178", "en": "You can't cross the sea merely by standing and staring at the water.", "cn": "光站在那里盯着海面，是没法穿越海洋的。"}, {"num": "NO.179", "en": "All human wisdom is summed up in these two words: wait and hope.", "cn": "人类所有的智慧可以归结为两个词：等待和希望。"}, {"num": "NO.180", "en": "Putting off an easy thing makes it hard, and putting off a hard one makes it impossible.", "cn": "简单的事情越拖越困难，困难的事情越拖越没法做。"}, {"num": "NO.181", "en": "The noblest art is that of making others happy.", "cn": "最高贵的艺术就是使人快乐的艺术。"}, {"num": "NO.182", "en": "The goal isn't to live forever; the goal is to create something that will.", "cn": "人生的目标不是要获得永生，而是要创造不朽之物。"}, {"num": "NO.183", "en": "Make improvements, not excuses. Seek respect, not attention.", "cn": "要追求进步，而不是一味地寻找借口。要寻求尊重，而不是一味地博取关注。"}, {"num": "NO.184", "en": "The truth is, I'm in love and there's nothing I can do about it.", "cn": "事实是，我深陷爱情，对此我束手无策。"}, {"num": "NO.185", "en": "Never let the fear of striking out keep you from playing the game.", "cn": "永远不要因为害怕被淘汰而不去争取。"}, {"num": "NO.186", "en": "I'm sure we'll meet in the spring. And catch up on everything.", "cn": "我们一定会在春天相见，好好聊个天。"}, {"num": "NO.187", "en": "The only reward of virtue is virtue; the only way to have a friend is to be one.", "cn": "唯一能回报美德的还是美德；能交到朋友的唯一方式是成为别人的朋友。"}, {"num": "NO.188", "en": "Fortune sides with him who dares.", "cn": "好运垂青有胆识的人。"}, {"num": "NO.189", "en": "Summer friends will melt away like summer snows, but winter friends are friends forever.", "cn": "盛夏的朋友会像盛夏的雪一样融化流逝，而数九寒天的朋友会是永远的朋友。"}, {"num": "NO.190", "en": "Keep integrity at every cost.", "cn": "要正直，不惜一切代价。"}, {"num": "NO.191", "en": "Success is connecting with the world and making people feel.", "cn": "成功就是与世界为伴，并感染周围的人。"}, {"num": "NO.192", "en": "You've got to try first before you say it's impossible.", "cn": "在说不可能之前，你得先试一试。"}, {"num": "NO.193", "en": "There are no great limits to growth because there are no limits of human intelligence, imagination, and wonder.", "cn": "成长的路是没有尽头的，因为人类的智慧、想象力和好奇心都是无限的。"}, {"num": "NO.194", "en": "And if there's love in this life, there's no obstacle. That can't be defeated.", "cn": "如果生活充满爱，世界将不再有阻碍，因为爱是不可战胜的。"}, {"num": "NO.195", "en": "Promise yourself to be so strong that nothing can disturb your peace of mind.", "cn": "对自己承诺：要强大到任何事情都无法扰乱你内心的平和。"}, {"num": "NO.196", "en": "Nobody realizes that some people expend tremendous energy merely to be normal.", "cn": "没有人意识到，有些人花了大量的精力就只是为了做个正常人。"}, {"num": "NO.197", "en": "It is not in the stars to hold our destiny but in ourselves.", "cn": "我们的命运掌握在我们自己手里，而不是天上的星星。"}, {"num": "NO.198", "en": "If you focus on what you left behind, you will never see what lies ahead.", "cn": "如果你只顾着回头看，你就永远无法看到前面有什么。"}, {"num": "NO.199", "en": "I have always regarded myself as the pillar of my life.", "cn": "我一直认为，我才是我人生中的中流砥柱。"}, {"num": "NO.200", "en": "A girl should be two things: classy and fabulous.", "cn": "每一个女孩都该做到两点：有品位并光芒四射。"}, {"num": "NO.201", "en": "Nothing great in the world has been accomplished without passion.", "cn": "世界上没有任何伟业的成就能够离得开激情。"}, {"num": "NO.202", "en": "Go outside your comfort zone. The rewards are worth it.", "cn": "踏出你的舒适圈吧，那些回报值得你这么做。"}, {"num": "NO.203", "en": "Instead of wondering when your next vacation is, maybe you should set up a life you don't need to escape from.", "cn": "与其期盼下一次假期，不如创造一种不需要逃避的生活。"}, {"num": "NO.204", "en": "Sometimes it takes a wrong turn to get you to the right place.", "cn": "有时候需要拐个弯才能到达正确的地方。"}, {"num": "NO.205", "en": "Sometimes you gotta get through your fears to see the beauty on the other side.", "cn": "有时候你需要克服内心的恐惧，才能看到对岸的美景。"}, {"num": "NO.206", "en": "You must expect great things of yourself before you can do them.", "cn": "你必须先期待一个很棒的自己，才能做出很棒的事来。"}, {"num": "NO.207", "en": "Wisdom is the power to put our time and our knowledge to the proper use.", "cn": "所谓智慧，就是有能力、恰当的用好我们的时间和知识。"}, {"num": "NO.208", "en": "Being brave means knowing that when you fail, you don't fail forever.", "cn": "勇敢就是知道即使你失败了，你也不会一直失败下去。"}, {"num": "NO.209", "en": "When we seek to discover the best in others, we somehow bring out the best in ourselves.", "cn": "当我们努力发掘他人的好时，我们往往也会看到自己最好的一面。"}, {"num": "NO.210", "en": "Bear in mind that you should conduct yourself in life as at a feast.", "cn": "要记住，你在生活中应该表现得像出席宴会一样优雅。"}, {"num": "NO.211", "en": "We cannot choose the day or time when we will fully bloom. It happens in its own time.", "cn": "我们无法选择自己完全盛开的时日。时候到了，它就会发生的。"}, {"num": "NO.212", "en": "Patience is bitter, but its fruit is sweet.", "cn": "忍耐是痛苦的，但它的结果是甜蜜的。"}, {"num": "NO.213", "en": "Change your life today. Don't gamble on the future, act now, without delay.", "cn": "从今天开始，改变生活。别把希望押注在未来，即刻行动，拒绝拖延。"}, {"num": "NO.214", "en": "In the midst of winter, I found there was, within me, an invincible summer.", "cn": "在隆冬的时候，我终于发现，在我的内心中有一个不可战胜的夏天。"}, {"num": "NO.215", "en": "Success doesn't come from what you do occasionally. It comes from what you do consistently.", "cn": "成功并不来自于你偶然做的事情，它来自于你一直在做的事情中。"}, {"num": "NO.216", "en": "A lot of people are afraid to say what they want. That's why they don't get what they want.", "cn": "很多人不敢说出他们想要的，这就是为什么他们想要的却无法得到。"}, {"num": "NO.217", "en": "A tiny change today brings a dramatically different tomorrow.", "cn": "今天微小的改变，全然会改变明天的样貌。"}, {"num": "NO.218", "en": "Family means no one gets left behind or forgotten.", "cn": "家庭意味着没有人会被落下，或者被遗忘。"}, {"num": "NO.219", "en": "We love life, not because we are used to living but because we are used to loving.", "cn": "我们热爱生活，不是因为我们习惯了生活，而是因为我们习惯了去热爱。"}, {"num": "NO.220", "en": "The two things in life you are in total control over are your attitude and your effort.", "cn": "生活中你可以完全掌控的两件事：你的态度和你付出的努力。"}, {"num": "NO.221", "en": "True happiness is not attained through self-gratification, but through fidelity to a worthy purpose.", "cn": "真正的幸福不是通过自我满足获得的，而是来自于对有价值目标的忠诚。"}, {"num": "NO.222", "en": "Love is just a word until someone comes along and gives it meaning.", "cn": "爱只不过是个词而已，直到有一个人来到你面前，赋予它意义。"}, {"num": "NO.223", "en": "Green was the silence, wet was the light, the month of June trembled like a butterfly.", "cn": "寂静生碧色，黎明露华浓，六月似蝴蝶在颤动。"}, {"num": "NO.224", "en": "Above all, the key to being heroine of your life, is to take full ownership of your choices, without apology.", "cn": "归根结底，成为自己人生的女主角，关键在于为自己的选择全权负责，且毫无歉意。"}, {"num": "NO.225", "en": "Above all, be the heroine of your life, not the victim.", "cn": "归根结底，成为自己人生的女主角，而不是受害者。"}, {"num": "NO.226", "en": "If you do not believe you can do it, then you have no chance at all.", "cn": "如果你不相信自己能做到，那么你就永远没有机会用到。"}, {"num": "NO.227", "en": "The beginning is the most important part of the work.", "cn": "工作中最重要的部分就是开始阶段。"}, {"num": "NO.228", "en": "Dripping water hollows out stone, not through force but through persistence.", "cn": "水滴石穿非力之所能为，乃持之以恒也。"}, {"num": "NO.229", "en": "We go where our very souls are called.", "cn": "我们前往灵魂受到召唤之处。"}, {"num": "NO.230", "en": "We go where our vision is.", "cn": "我们的视野有多远，就能走多远。"}, {"num": "NO.231", "en": "Courage is doing what you're afraid to do, there can be no courage unless you're scared.", "cn": "行畏惧之事可谓勇；无畏则无勇。"}, {"num": "NO.232", "en": "Nothing you wear is more important than your smile.", "cn": "无论如何穿搭，都比不上带上你的的微笑。"}, {"num": "NO.233", "en": "An aim in life is the only fortune worth finding.", "cn": "生活的目标，是唯一值得我们去寻找的财富。"}, {"num": "NO.234", "en": "Change, like healing, takes time.", "cn": "改变犹如伤口愈合，需要时间。"}, {"num": "NO.235", "en": "It is easy to live for others, everyone does. I call on you to live for yourself.", "cn": "为他人而活很简单，每个人都可以做到，但我号召你们为自己而活。"}, {"num": "NO.236", "en": "Keep your best wishes, close to your heart and watch what happens.", "cn": "一直怀揣着最美的愿望，倾听内心的声音，再看看会发生什么。"}, {"num": "NO.237", "en": "Challenges make you discover things about yourself that you never really know.", "cn": "挑战能让你发现自己都不曾了解过的一面。"}, {"num": "NO.238", "en": "Life is only interesting if life is wide.", "cn": "生活只有变得广泛，才会有趣。"}, {"num": "NO.239", "en": "Years may wrinkle the skin, but to give up enthusiasm wrinkles the soul.", "cn": "岁月留痕，只及肌肤；激情不再，皱起心灵。"}, {"num": "NO.240", "en": "Years, my weary witnesses, have seen the silent wars I fought within the quiet chambers of my own heart.", "cn": "岁月，我疲惫的见证者，已目睹了我在内心寂静厅堂中所进行的一切无声战争。"}, {"num": "NO.241", "en": "If you don't imagine, nothing ever happens at all.", "cn": "想都不敢想，就什么都不会发生。"}, {"num": "NO.242", "en": "Not he who has much is rich, but he who gives much.", "cn": "拥有的多并不算富有，给予的多才算富有。"}, {"num": "NO.243", "en": "Life is not merely be alive, but being well.", "cn": "生活不止是活着，而是精彩的活着。"}, {"num": "NO.244", "en": "It always seems impossible until it's done.", "cn": "事情未成功之前，总看似不可能完成。"}, {"num": "NO.245", "en": "I truly believe there's always a solution to every problem.", "cn": "我确信每个问题都有解决办法。"}, {"num": "NO.246", "en": "Never bend your head. Always hold it high. Look the world straight in the face.", "cn": "永远不要弯下你的头，要一直高昂着头，直面这个世界。"}, {"num": "NO.247", "en": "Only I can change my life. No one can do it for me.", "cn": "能改变生活的只有我自己，没人能替我改变。"}, {"num": "NO.248", "en": "I never dreamed about success. I worked for it.", "cn": "我从未梦想着成功，我只向着成功努力。"}, {"num": "NO.249", "en": "Life is what happens to you while you're busy making other plans.", "cn": "人生就是当你忙着制定其它计划时，正发生在你身上的一切。"}, {"num": "NO.250", "en": "The most beautiful thing you can wear is confidence.", "cn": "自信就是你最美丽的外衣。"}, {"num": "NO.251", "en": "When life gives you lemons, make lemonade.", "cn": "当生活丢给你柠檬时，把它榨成柠檬汁。"}, {"num": "NO.252", "en": "All great achievements require time.", "cn": "所有伟大的成就都需要时间的历练。"}, {"num": "NO.253", "en": "If you always do what interests you, at least one person is pleased.", "cn": "如果你总是做自己喜欢的事情，至少有一个人开心。"}, {"num": "NO.254", "en": "Opportunities are like sunrises. If you wait too long, you miss them.", "cn": "机会如同日出，等太久就会错过。"}, {"num": "NO.255", "en": "People may hear your words, but they feel your attitude.", "cn": "人们或许能听到你说的话，但更能感受到你的态度。"}, {"num": "NO.256", "en": "When everything seems to be going against you, remember that the airplane takes off against the wind, not with it.", "cn": "当你感受到似乎事事不顺时，记住，飞机都是逆风起飞的，而不是顺风。"}, {"num": "NO.257", "en": "Take chances; make mistakes. That's how you grow.", "cn": "去尝试，去犯错，你就是这样成长起来的。"}, {"num": "NO.258", "en": "They always say time changes things, but you actually have to change them yourself.", "cn": "人们总说时间会改变一切，但实际上改变它们的还是你自己。"}, {"num": "NO.259", "en": "Happiness, it comes on unexpectedly. And goes beyond, really, any early morning talk about it.", "cn": "幸福，在不经意间降临，它着实胜过每个谈论幸福的清晨。"}, {"num": "NO.260", "en": "When all else is lost, the future still remains.", "cn": "即使失去一切，未来仍在。"}, {"num": "NO.261", "en": "Do something wonderful; people may imitate it.", "cn": "去做一些美好的事情，人们可能会效仿这些事。"}, {"num": "NO.262", "en": "One's life has value so long as one attributes value to the life of others, by means of love, friendship, indignation and compassion.", "cn": "只要一个人以爱、友谊、义愤与悲悯之心，让他人的生命拥有价值，他的人生便有意义。"}, {"num": "NO.263", "en": "The most wasted of all days is one without laughter.", "cn": "没有欢笑的一天便是虚度。"}, {"num": "NO.264", "en": "You can't help getting older, but you don't have to get old.", "cn": "你无法阻止变老，但你不一定要变老。"}, {"num": "NO.265", "en": "The real problem of leisure time is how to keep others from using yours.", "cn": "闲暇时间的真正问题时如何防止别人占用你的时间。"}, {"num": "NO.266", "en": "Growth is painful. Change is painful. But nothing is as painful as staying stuck somewhere you don't belong.", "cn": "成长是痛苦的，改变也是痛苦的，但是最痛苦的事情，是在一个不属于你的地方，动弹不得。"}, {"num": "NO.267", "en": "Only those who risk going too far can possibly find out how far they can go.", "cn": "只有那些敢于冒险大步向前的人，才可能知道自己能走多远。"}, {"num": "NO.268", "en": "Don't be pushed around by the fears in your mind. Be led by the dreams in your heart.", "cn": "不要被脑中的恐惧所牵制，要让心中的梦想指引着你。"}, {"num": "NO.269", "en": "Always do your best. What you plant now, you will harvest later.", "cn": "永远要全力以赴，今日播下的种子，终会得到丰收。"}, {"num": "NO.270", "en": "Knowing is not enough; we must apply. Willing is not enough; we must do.", "cn": "获得知识是不够的，我们还必须去应用；立下志向也不够，我们还必须去做。"}, {"num": "NO.271", "en": "Passion makes the world go round. Love just makes it a safer place.", "cn": "热情使世界转动，爱让它成为一个更安全的地方。"}, {"num": "NO.272", "en": "It is very simple to be happy, but it is very difficult to be simple.", "cn": "快乐很简单，但要做到简单却很困难。"}, {"num": "NO.273", "en": "Storms make trees take deeper roots.", "cn": "暴风雨使得树木的根扎得更深。"}, {"num": "NO.274", "en": "If you spend your whole life waiting for the storm, you'll never enjoy the sunshine.", "cn": "如果你一生都在等待暴风雨，你就永远不会享受阳光。"}, {"num": "NO.275", "en": "Some people could look at a mud puddle and see an ocean with ships.", "cn": "有些人眼睛虽然望着泥塘，却能看见千帆竞发的海洋。"}, {"num": "NO.276", "en": "Care and diligence bring luck.", "cn": "细心和勤奋能带来好运。"}, {"num": "NO.277", "en": "It takes a great deal of courage to stand up to your enemies, but a great deal more to stand up to your friends.", "cn": "要挺身而出对抗敌人的确需要很大勇气，但要挺身而出反抗朋友还需要更大的勇气。"}, {"num": "NO.278", "en": "Leave nothing for tomorrow which can be done today.", "cn": "今天能做的，就不要拖到明天。"}, {"num": "NO.279", "en": "If you tell the truth, you don't have to remember anything.", "cn": "如果你说实话，就不必刻意记住任何事。"}, {"num": "NO.280", "en": "Two wrongs don't make a right, but they make a good excuse.", "cn": "两个人都犯了错不能把事情变成对的，但能成为一个好借口。"}, {"num": "NO.281", "en": "Success is falling nine times and getting up ten.", "cn": "成功就是跌倒九次，第十次仍会站起来。"}, {"num": "NO.282", "en": "Everything you've ever wanted is on the other side of fear.", "cn": "你想要的一切都在恐惧的背面。"}, {"num": "NO.283", "en": "The best way to have a good idea is to have lots of ideas.", "cn": "找到好点子的最佳办法，就是多想点子。"}, {"num": "NO.284", "en": "You cannot change what you are, only what you do.", "cn": "你无法改变你是谁，只能改变你的所作所为。"}, {"num": "NO.285", "en": "Respond to every call that excites your spirit.", "cn": "回应每一个使你精神振奋的呼唤。"}, {"num": "NO.286", "en": "It's amazing how you can speak right to my heart.", "cn": "你一开口就能契合我的心意，这是多么的神奇。"}, {"num": "NO.287", "en": "You can't move on until you let go of the past.", "cn": "忘掉过去才能继续前进。"}, {"num": "NO.288", "en": "In the midst of movement and chaos, keep stillness inside of you.", "cn": "在变动和混乱当中，要能保持内在的平静。"}, {"num": "NO.289", "en": "It is the supreme art of the teacher to awaken joy in creative expression and knowledge.", "cn": "用创造性表达和知识来唤醒快乐，是教师的最高艺术。"}, {"num": "NO.290", "en": "We ran as if to meet the moon.", "cn": "我们奔跑着，像去约见月亮。"}, {"num": "NO.291", "en": "The key to winning is poise under stress.", "cn": "获得胜利的关键是在压力下依旧保持镇静。"}, {"num": "NO.292", "en": "How you think when you lose determines how long it will be until you win.", "cn": "成为输家时的想法决定了你何时才能取得胜利。"}, {"num": "NO.293", "en": "The most difficult thing is the decision to act, the rest is merely tenacity.", "cn": "最困难的是下定决心去做，剩下的只是坚持而已。"}, {"num": "NO.294", "en": "The courage to imagine the otherwise is our greatest resource, adding color and suspense to all our life.", "cn": "敢有不同想象的勇气，是我们最大的资产，它使我们的人生增添色彩，充满悬念。"}, {"num": "NO.295", "en": "However bad life may seem, there is always something you succeed at.", "cn": "不管生活有多糟，总有一件事是你擅长的。"}, {"num": "NO.296", "en": "Soon is not as good as now.", "cn": "别谈未来，现在就行动。"}, {"num": "NO.297", "en": "There is just one life for each of us: our own.", "cn": "我们都只有一种生活可以过：自己的生活。"}, {"num": "NO.298", "en": "Where you stumble and fall, there you will find gold.", "cn": "你在哪里跌倒，就会在哪里找到金子。"}, {"num": "NO.299", "en": "A kind heart is a fountain of gladness, making everything in its vicinity freshen into smiles.", "cn": "善良的心就如一口快乐的喷泉，让附近的一切都充满欢笑。"}, {"num": "NO.300", "en": "Discipline is the bridge between goals and accomplishment.", "cn": "自律是连接目标与成功的桥梁。"}, {"num": "NO.301", "en": "Aim for the moon. If you miss, you may hit a star.", "cn": "瞄准月亮，若未能打中，或许还能打中星星。"}, {"num": "NO.302", "en": "Keep your eyes on the stars, and your feet on the ground.", "cn": "志存高远，脚踏实地。"}, {"num": "NO.303", "en": "I'm only brave when I have to be. Being brave doesn't mean you go looking for trouble.", "cn": "我只是在必要的时候才会勇敢，勇敢并不代表你要到处闯祸。"}, {"num": "NO.304", "en": "Believe in women first, and then others will believe in you.", "cn": "先相信女人，然后别人才会相信你。"}, {"num": "NO.305", "en": "Life is what happens to you when you're busy making other plans.", "cn": "当你忙着为生活做其他打算时，它已悄然来临。"}, {"num": "NO.306", "en": "Life's most persistent and urgent question is \"What are you doing for others?\"", "cn": "生命中最永恒和急迫的问题便是：你能为别人做些什么？"}, {"num": "NO.307", "en": "It's not beauty that endears, it's love that makes us see beauty.", "cn": "并非美丽招人爱，而是爱让我们看到了美丽。"}, {"num": "NO.308", "en": "The end is always right there in the beginning.", "cn": "每一次的结束都是另一个开始。"}, {"num": "NO.309", "en": "I never lose. Either I win or learn.", "cn": "我从来没有输过，因为我要么赢要么有所收获。"}, {"num": "NO.310", "en": "Nothing is impossible, the word itself says \"I’m possible!\"", "cn": "没有什么是不可能，连“不可能”这个词自己都说：“不，可能！”"}, {"num": "NO.311", "en": "Death is just a part of life, something we're all destined to do.", "cn": "死亡是生命的一部分，是我们注定要做的一件事。"}, {"num": "NO.312", "en": "Remember there's no such thing as a small act of kindness. Every act creates a ripple with no logical end.", "cn": "记住没有小善之举这回事，每一次善行都会激起无尽的连锁反应。"}, {"num": "NO.313", "en": "Life moves pretty fast. If you don't stop and look around once in a while, you could miss it.", "cn": "人生匆匆，如果不时常停下脚步四处瞧瞧，你可能就会错过它。"}, {"num": "NO.314", "en": "You don't have to bend until you break. You just have to get up.", "cn": "你不必一味屈服，让自己受伤，你只需要打起精神做自己。"}, {"num": "NO.315", "en": "Never does nature say one thing and wisdom another.", "cn": "自然与智慧永不相悖。"}, {"num": "NO.316", "en": "Why are you trying so hard to fit in when you are born to stand out?", "cn": "你本就生而不凡，为何还要拼命去迎合大众呢？"}, {"num": "NO.317", "en": "Do you know that there's a chance for you? Cause there's a spark in you.", "cn": "你知道吗？你还有机会，因为你心中藏有火花。"}, {"num": "NO.318", "en": "It is by acts and not by ideas that people live.", "cn": "人依靠行动而活，而非想法。"}, {"num": "NO.319", "en": "All your lights are red, but I'm green to go.", "cn": "你哪怕示以红灯拒我前行，我也会心向绿灯一刻都不停。"}, {"num": "NO.320", "en": "Do not linger to gather flowers to keep them, but walk on, for flowers will keep themselves blooming all your way.", "cn": "不要流连于采集花朵，只管向前走，一路上自会有百花盛开。"}, {"num": "NO.321", "en": "Work hard in silence, let your success be your noise.", "cn": "在沉默中努力吧，让成功为你发声。"}, {"num": "NO.322", "en": "Health and cheerfulness naturally beget each other.", "cn": "安康喜乐，相生相成。"}, {"num": "NO.323", "en": "The wound is the place where the light enters you.", "cn": "伤口是光照进你内心的地方。"}, {"num": "NO.324", "en": "A happy family is but an earlier heaven.", "cn": "幸福的家庭犹如人间天堂。"}, {"num": "NO.325", "en": "I celebrate myself, and sing myself.", "cn": "我为自己欢庆，为自己歌唱。"}, {"num": "NO.326", "en": "No matter how many goals you have achieved, you must set your sights on a higher one.", "cn": "不管你实现了多少目标，总要定睛于下一个更远大的。"}, {"num": "NO.327", "en": "Alone we can do so little; together we can do so much.", "cn": "独自一人，我们能做的很少；团结一心，我们能成就很多。"}, {"num": "NO.328", "en": "Don't watch the clock. Do what it does. Keep going.", "cn": "不要只看时钟，要效仿时钟，一直前行。"}, {"num": "NO.329", "en": "If something is important enough, even if the odds are against you, you should still do it.", "cn": "如果一件事情对你很重要，即使成功的概率很小，你也应该去做。"}, {"num": "NO.330", "en": "Eloquent speech is not from lip to ear, but rather from heart to heart.", "cn": "有说服力的演讲非由口传递到耳，而是由心到心。"}, {"num": "NO.331", "en": "You can overcome anything, if you love something enough.", "cn": "只要你足够热爱一件事，就可以克服任何困难。"}, {"num": "NO.332", "en": "Tough times never last, but tough people do.", "cn": "艰难的时光终将过去，但是坚强的人会走到最后。"}, {"num": "NO.333", "en": "When someone loves you, the way they talk about you is different. You feel safe and comfortable.", "cn": "爱你的人谈起你的方式是不一样的，你会觉得安全又舒适。"}, {"num": "NO.334", "en": "Knowledge is of no value unless you put it into practice.", "cn": "只有付诸实践，知识才有价值。"}, {"num": "NO.335", "en": "Action is the foundational key to all success.", "cn": "行动是所有成功的根本。"}, {"num": "NO.336", "en": "Live as if you were to die tomorrow. Learn as if you were to live forever.", "cn": "像明天就会离世那样生活，像可以永葆青春那样学习。"}, {"num": "NO.337", "en": "The difference between stupidity and genius is that genius has its limits.", "cn": "愚蠢和天赋的区别在于，天赋是有极限的。"}, {"num": "NO.338", "en": "Don't listen to what others say about you, lead your own life.", "cn": "别管别人怎么说，过好自己的生活就行。"}, {"num": "NO.339", "en": "While there is life, there is hope.", "cn": "一息若存，希望不灭。"}, {"num": "NO.340", "en": "Failure is not the opposite of success; it's part of success.", "cn": "失败不是成功的反义词，它是成功的一部分。"}, {"num": "NO.341", "en": "The secret of getting ahead is getting started.", "cn": "前进的秘诀，就是着手开始。"}, {"num": "NO.342", "en": "Simplicity is the peak of civilization.", "cn": "极简是文明的极致。"}, {"num": "NO.343", "en": "The longer the meeting, the less is accomplished.", "cn": "会议越长，效率越低。"}, {"num": "NO.344", "en": "Life is short, and no one deserves to ride the bus alone.", "cn": "人生苦短，没人应该孤单上路。"}, {"num": "NO.345", "en": "If you cannot do great things, do small things in a great way.", "cn": "如果你不能做大事，就用伟大的方式做小事。"}, {"num": "NO.346", "en": "Today, I consider myself the luckiest man on the face of the earth.", "cn": "现在，我想我是这个世界上最幸运的人。"}, {"num": "NO.347", "en": "Life is the sum of all your choices.", "cn": "你做的所有抉择造就了你的人生。"}, {"num": "NO.348", "en": "In the end, life teaches us what is important, and that is family.", "cn": "生活最终会让我们明白什么最重要，那就是家庭。"}, {"num": "NO.349", "en": "Always bear in mind that your own resolution to succeed is more important than any other one thing.", "cn": "牢记一点，你想成功的决心比其他任何事情都要紧。"}, {"num": "NO.350", "en": "The greatest test of courage is to bear defeat without losing heart.", "cn": "接受失败而不是气馁是对勇气最大的考验。"}, {"num": "NO.351", "en": "Happiness is the natural flower of duty.", "cn": "幸福是自责任中自然长出的花朵。"}, {"num": "NO.352", "en": "Faster. Higher. Stronger — Together.", "cn": "更快，更高，更强——更团结。"}, {"num": "NO.353", "en": "Good manners and soft words have brought many a difficult thing to pass.", "cn": "礼貌的行为和温柔的话语会让很多难题迎刃而解。"}, {"num": "NO.354", "en": "To do nothing is the way to be nothing.", "cn": "无所事事终将一事无成。"}, {"num": "NO.355", "en": "An ounce of action is worth a ton of theory.", "cn": "一盎司的行动，价值相当于一吨的理论。"}, {"num": "NO.356", "en": "Don't be afraid of your fears. They're there to let you know that something is worth it.", "cn": "别害怕自己的恐惧，它让你知道有些事情值得去做。"}, {"num": "NO.357", "en": "If I have seen further, it is by standing on the shoulders of giants.", "cn": "如果我看得更远，那是因为我站在巨人的肩膀上。"}, {"num": "NO.358", "en": "No amount of anxiety makes any difference to anything that is going to happen.", "cn": "再焦虑也不能改变即将要发生的事。"}, {"num": "NO.359", "en": "Deciding what not to do is as important as deciding what to do.", "cn": "决定不做什么同决定做什么一样重要。"}, {"num": "NO.360", "en": "They invented hugs to let people know you love them without saying anything.", "cn": "拥抱，是让你一句话也不用说，就让别人知道你爱着他们。"}, {"num": "NO.361", "en": "And so rock bottom became the solid foundation on which I rebuilt my life.", "cn": "人生的低谷成为了我重建生活的坚实基础。"}, {"num": "NO.362", "en": "Skill and confidence are an unconquered army.", "cn": "技能和信心是一支不可战胜的军队。"}, {"num": "NO.363", "en": "Change your thoughts and you change your world.", "cn": "改变你的想法，就是改变了你的世界。"}, {"num": "NO.364", "en": "If a thing isn't worth saying, you sing it.", "cn": "如果一件事不值得说出来，你就把它唱出来吧。"}, {"num": "NO.365", "en": "Respect other people's feelings. It might mean nothing to you, but it could mean everything to them.", "cn": "尊重他人的感受，这对你可能无关紧要，但可能对他人十分重要。"}, {"num": "NO.366", "en": "In the middle of every difficulty comes opportunity.", "cn": "每一个困境中都会出现机会。"}, {"num": "NO.367", "en": "Where there is ruin, there is hope for a treasure.", "cn": "凡是有墟骸的地方，就有可能藏着宝藏。"}, {"num": "NO.368", "en": "The power of imagination makes us infinite.", "cn": "想象力让我们突破极限。"}, {"num": "NO.369", "en": "A problem is a chance for you to do your best.", "cn": "问题也是机会，你得以把事情做到最好。"}, {"num": "NO.370", "en": "All achievements, all earned riches, have their beginning in an idea.", "cn": "所有的成就和财富都是从一个想法开始的。"}, {"num": "NO.371", "en": "The sun always has ways to reach us.", "cn": "不管我你在哪儿，太阳总有办法照到我们。"}, {"num": "NO.372", "en": "If one does not know to which port one is sailing, no wind is favorable.", "cn": "如果你不知道要驶向哪个港口，任何风向都毫无助益。"}, {"num": "NO.373", "en": "All of us, at certain moments of our lives, need to take advice and to receive help from other people.", "cn": "在生命的某些时刻，我们每个人都需要听取他人的意见，接受他人的帮助。"}, {"num": "NO.374", "en": "I'm not telling you it is going to be easy, I'm telling you it is going to be worth it.", "cn": "我不会告诉你这个过程很容易，我只会告诉你这一切都是值得的。"}, {"num": "NO.375", "en": "Life is the flower for which love is the honey.", "cn": "生命如花，爱情如蜜。"}, {"num": "NO.376", "en": "Not life, but good life, is to be chiefly valued.", "cn": "最重要的不是生命，而是美好的生命。"}, {"num": "NO.377", "en": "Success is not how high you have climbed, but how you make a positive difference to the world.", "cn": "成功不是你爬了有多高，而是你如何为这个世界带来积极的影响。"}, {"num": "NO.378", "en": "Don't cry when the sun is gone, because the tears won't let you see the stars.", "cn": "不要在太阳落下时哭泣，因为泪水会让你错过星星。"}, {"num": "NO.379", "en": "Without the dark there isn't light. Without the pain there is no relief.", "cn": "没有黑暗，也就没有光明。没有痛苦，也就没有解脱。"}, {"num": "NO.380", "en": "Respect for ourselves guides our morals.", "cn": "尊重自己能让我们明辨是非。"}, {"num": "NO.381", "en": "Respect for ourselves guides our morals; respect for others guides our manners.", "cn": "尊重自己引导我们的品德，尊重他人指导我们的礼仪。"}, {"num": "NO.382", "en": "One can never constantly remain the same; change is the only constant in life.", "cn": "人不可能永远保持不变，变化才是生命中的唯一常态。"}, {"num": "NO.383", "en": "One can never consent to creep when one feels an impulse to soar.", "cn": "一个人内心有了飞翔的冲动，就不会满足于在地上匍匐。"}, {"num": "NO.384", "en": "If opportunity doesn't knock, build a door.", "cn": "如果机会不来敲门，那就建一扇门。"}, {"num": "NO.385", "en": "Never regret. If it's good, it's wonderful. If it's bad, it's experience.", "cn": "永远别后悔。若结果美好，那很精彩。若结果糟糕，那是来时的路。"}, {"num": "NO.386", "en": "You make a life out of what you have, not what you are missing.", "cn": "你是靠自己所拥有的，而不是所缺少的来过你的人生。"}, {"num": "NO.387", "en": "Dreams are like stars. You may never touch them, but if you follow them, they will lead you to your destiny.", "cn": "梦想就像星星，也许你永远无法触碰，但如果你跟随它们，它们将引领你找到人生的路。"}, {"num": "NO.388", "en": "The future belongs to those who believe in the beauty of their dreams.", "cn": "未来属于那些相信自己美丽梦想的人。"}, {"num": "NO.389", "en": "Books are the treasuries of human knowledge.", "cn": "书籍是人类知识的宝库。"}, {"num": "NO.390", "en": "The hardships that I encountered in the past will help me succeed in the future.", "cn": "我过去遇到的困难将帮助我在未来取得成功。"}, {"num": "NO.391", "en": "The constant happiness is curiosity.", "cn": "求知欲是长久的快乐。"}, {"num": "NO.392", "en": "True friends are never apart, maybe in distance but never in heart.", "cn": "真正的朋友从不分离，也许相距甚远，但永远心连着心。"}, {"num": "NO.393", "en": "Even a happy life cannot be without a measure of darkness, and the word happy would lose its meaning if it were not balanced by sadness.", "cn": "即使是幸福的生活也不可能没有一丝黑暗，如果没有悲伤来平衡，快乐这个词就会失去意义。"}, {"num": "NO.394", "en": "Life is partly what we make it, and partly what it is made by the friends we choose.", "cn": "生活一部分是我们自己创造的，另一部分是由我们选择的朋友造就的。"}, {"num": "NO.395", "en": "Love recognizes no barriers. It jumps hurdles, leaps fences, penetrates walls to arrive at its destination full of hope.", "cn": "爱情不识藩篱。它跨过栏杆，越过栅栏，穿透围墙，满怀希望地抵达终点。"}, {"num": "NO.396", "en": "You don't love someone because they're perfect. You love them in spite of the fact that they're not.", "cn": "不是因为一个人完美你才去爱，而是即使那个人不完美你也会去爱。"}, {"num": "NO.397", "en": "You've always had the power my dear, you just had to learn it for yourself.", "cn": "其实你一直都有那份力量，你只是需要学着去使用它。"}, {"num": "NO.398", "en": "Love makes man grow up or sink down.", "cn": "爱情，要么让人成熟，要么让人堕落。"}, {"num": "NO.399", "en": "Dew turns into frost since tonight; the moon viewed at home is more bright.", "cn": "露从今夜白，月是故乡明。"}, {"num": "NO.400", "en": "Be careful how you judge people, most of all friends. You don't sum up a man's life in one moment.", "cn": "小心你是怎么评价他人的，尤其是朋友。你无法在片刻间总结一个人的一生。"}, {"num": "NO.401", "en": "Just trust yourself, then you will know how to live.", "cn": "相信自己就对了，你将知道如何过日子。"}, {"num": "NO.402", "en": "What is right is not always popular and what is popular is not always right.", "cn": "对的事不见得都受欢迎，受欢迎的事不见得都是对的。"}, {"num": "NO.403", "en": "So often people are working so hard at the wrong thing. Working on the right thing is probably more important than working hard.", "cn": "很多时候人们努力错了方向，在对的事情上努力可能比努力本身还重要。"}, {"num": "NO.404", "en": "Nothing is so strong as gentleness, and nothing is so gentle as real strength.", "cn": "没有什么比温柔更有力量，也没有什么比真正的力量更温柔。"}, {"num": "NO.405", "en": "Don't look for happiness outside yourself. The source of happiness is within.", "cn": "不要向外寻找快乐，开悟之人在内心寻找幸福。"}, {"num": "NO.406", "en": "You miss 100% of the shots you don't take.", "cn": "你不去射门的话，就100%进不了球。"}, {"num": "NO.407", "en": "Life's a mixed bag, no matter who you are.", "cn": "生活总是喜忧参半，无论你是谁。"}, {"num": "NO.408", "en": "How lucky I am to have something that makes saying goodbye so hard.", "cn": "能拥有一些难以割舍的东西，这是多么幸运啊。"}, {"num": "NO.409", "en": "Happiness adds and multiplies, as we divide it with others.", "cn": "与他人分享快乐，我们就会收获加倍的快乐。"}, {"num": "NO.410", "en": "That was my way of getting through difficult times — writing.", "cn": "那是我在身心煎熬、无人慰藉时撑过艰难时期的方式——写作。"}, {"num": "NO.411", "en": "That was my way of getting through difficult times of low confidence — hard work.", "cn": "克服自信低潮的艰难时期，我只用一个方法——努力。"}, {"num": "NO.412", "en": "Yesterday I was clever, so I wanted to change the world. Today I am wise, so I am changing myself.", "cn": "昨天的我聪明，所以我想改变世界；今天的我明智，所以我选择改变自己。"}, {"num": "NO.413", "en": "I have crossed oceans of time to find you.", "cn": "我跨越了时间的瀚海来把你找寻。"}, {"num": "NO.414", "en": "When I am with you, there's no place I'd rather be.", "cn": "只要有你相伴，便无它处可比拟。"}, {"num": "NO.415", "en": "It's been my experience that you can nearly always enjoy something if you make up your mind firmly that you will.", "cn": "我的经验是，事情只要下定决心去享受，就基本能享受到。"}, {"num": "NO.416", "en": "May your past be the sound of your feet upon the ground. Carry on.", "cn": "愿你的过去只是你前进步伐所踏出的声响，继续前进吧。"}, {"num": "NO.417", "en": "Life is a collection of moments. The idea is to have many good ones that you can remember.", "cn": "生活是由一个个瞬间组成，而宗旨就是拥抱你能拥抱的更多的美好瞬间。"}, {"num": "NO.418", "en": "In any given moment we have two options: to step forward into growth or to step back into safety.", "cn": "任何时刻我们都有两个选择：往前走走向成长，或退后走向安全。"}, {"num": "NO.419", "en": "Only one thing can make a soul complete, and that thing is love.", "cn": "只有一样东西可以让灵魂完整，那就是爱。"}, {"num": "NO.420", "en": "Catch the moment. You are going to be a long time dead.", "cn": "把握此刻，你将要离开这个世界很久很久。"}, {"num": "NO.421", "en": "We live in the world when we love it.", "cn": "我们只有真正热爱这个世界，才算真正地活着。"}, {"num": "NO.422", "en": "I have failed over and over and over again in my life, and that is why I succeed.", "cn": "我的人生经历了一次次失败，正因如此，我才能成功。"}, {"num": "NO.423", "en": "Winning medals wasn't the point of the Olympics. It's the participating that counts.", "cn": "奥运会的意义不在于赢得奖牌，而是参与其中。"}, {"num": "NO.424", "en": "Sports teaches you character, it teaches you to play by the rules, it teaches you to know what it feels like to win and lose — it teaches you about life.", "cn": "体育塑造你的性格，教会你遵守规则，让你体会输赢——它教会你生活。"}, {"num": "NO.425", "en": "Faster. Higher. Stronger. Together.", "cn": "更高，更快，更强—更团结。"}, {"num": "NO.426", "en": "You will never be able to escape from your heart. So it's better to listen to what it has to say.", "cn": "既然无法逃避自己的内心，就不如好好地听听它在说什么。"}, {"num": "NO.427", "en": "If you believe in yourself enough and know what you want, you can make it happen.", "cn": "如果你足够自信，也知道自己想要什么，就一定会实现心中所想。"}, {"num": "NO.428", "en": "We are the hero of our own story.", "cn": "我们都是自己故事里的英雄。"}, {"num": "NO.429", "en": "I didn't set out to beat the world; I just set out to do my absolute best.", "cn": "我并未打算打败全世界，我只是全力以赴。"}, {"num": "NO.430", "en": "Faster. Higher. Stronger-Together.", "cn": "更快，更高，更强——更团结。"}, {"num": "NO.431", "en": "I'll let you be in my dreams if I can be in yours.", "cn": "如果我能出现在你的梦里，我也会让你出现在我的梦里。"}, {"num": "NO.432", "en": "Never eat more than you can lift.", "cn": "吃的永远不要比能拿的多"}, {"num": "NO.433", "en": "There are no limits to what you can accomplish, except the limits you place on your own thinking.", "cn": "你所能完成的事情没有限制，除非你限制了自己的想法。"}, {"num": "NO.434", "en": "He wore this special peony-themed costume at the concert in Luoyang.", "cn": "他在洛阳演唱会上穿了这套特殊的牡丹花造型的演出服。"}, {"num": "NO.435", "en": "You may not control all the events that happen to you, but you can decide not to be reduced by them.", "cn": "你可能无法控制所有发生在你身上的事，但是你可以决定不被它们所累。"}, {"num": "NO.436", "en": "If you change the way you look at things, the things you look at change.", "cn": "如果你改变看事物的方式，事物也会因此而改变。"}, {"num": "NO.437", "en": "Build your own dreams, or someone else will hire you to build theirs.", "cn": "拥有自己的梦想，否则别人就会雇佣你实现他们的梦想。"}, {"num": "NO.438", "en": "We do not remember days, we remember moments.", "cn": "我们往往记住的不是某一天，而是某个时刻。"}, {"num": "NO.439", "en": "Shallow men believe in luck. Strong men believe in cause and effect.", "cn": "浅薄者相信运气；有能力的人相信因果。"}, {"num": "NO.440", "en": "You were not made to live like brutes, but to pursue virtue and knowledge.", "cn": "人不应当像走兽一样活着，而应该追求美德和知识。"}, {"num": "NO.441", "en": "Drama is life with the dull bits cut out.", "cn": "戏剧就是去掉了无聊片段的生活。"}, {"num": "NO.442", "en": "You are not beaten until you admit it.", "cn": "在你承认之前，你尚未失败。"}, {"num": "NO.443", "en": "Sports teaches you character. it teaches you to play by the rules. it teaches you to know what it feels like to win and loseit teaches you about life.", "cn": "体育塑造你的性格，教会你遵守规则，让你体会输赢——它教会你生"}, {"num": "NO.444", "en": "I have failed over and over and over again in my life and that is why I succeed.", "cn": "我的人生经历了一次又一次的失败，正因如此，我才能成功。"}, {"num": "NO.445", "en": "No amount of money ever bought a second of time.", "cn": "再多的钱也无法买回逝去的光阴。"}, {"num": "NO.446", "en": "Sports teaches you character. it teaches you to play by the rules. tt teaches you to know what it feels like to win and loseit teaches you about life.", "cn": "体育塑造你的性格，教会你遵守规则，让你体会输赢—它教会你生活。"}, {"num": "NO.447", "en": "Don't be afraid that your life will end, be afraid that it will never begin.", "cn": "不要害怕你的生活会结束，应该担心你的生活从未真正开始过。"}, {"num": "NO.448", "en": "Happiness often sneaks in through a door you didn't know you left open.", "cn": "幸福往往从你不经意间打开的门中不期而至。"}, {"num": "NO.449", "en": "Up here, we gotta push it. That's our job.", "cn": "到了高空我们就要全力以赴。这是我们的职责。"}, {"num": "NO.450", "en": "Climb mountains not so the world can see you, but so you can see the world.", "cn": "爬上山顶不是为了让世界看到你，而是为了让你看到整个世界。"}, {"num": "NO.451", "en": "If you only shine light on your flaws, all your perfects will dim.", "cn": "如果只看到自己的缺点，你所有的美好都会黯然失色。"}, {"num": "NO.452", "en": "Distance never separates two hearts that are meant to be together.", "cn": "距离从来不会分开两颗真正在乎彼此的心。"}, {"num": "NO.453", "en": "Life is a journey, not a destination.", "cn": "人生如旅程，而非目的地。"}, {"num": "NO.454", "en": "Acceptance is to love and embrace everything that we find within ourselves, like a mother embraces her child.", "cn": "所谓接纳，就是去爱并拥抱我们内心的一切，就像一个母亲拥抱自己的孩子一样。"}, {"num": "NO.455", "en": "If you see someone without a smile. give them one of yourself.", "cn": "如果看见有人愁眉不展，就把你的微笑分享给他们吧！"}, {"num": "NO.456", "en": "We love our nation. This is the source of our confidence.", "cn": "我们爱我们的祖国，这是我们信心的源泉。"}, {"num": "NO.457", "en": "We lose ourselves in things we love. We find ourselves there, too.", "cn": "我们会在所爱之事中失去自己，但也会在其中找到自己。"}, {"num": "NO.458", "en": "A bird doesn't sing because it has an answer, it sings because it has a song.", "cn": "鸟儿唱歌不是因为它知道答案，而是因为它心中有一支歌。"}, {"num": "NO.459", "en": "You're braver than you believe, and stronger than you seem, and smarter than you think.", "cn": "你比自己想象中的更勇敢，比看起来要更强大，比自己所认为的更聪明。"}, {"num": "NO.460", "en": "If life throws you a few bad notes or vibrations, don't let them interrupt or alter your song.", "cn": "即便生活给了你一些不和谐的音符，也别让它们破坏你的人生之歌。"}, {"num": "NO.461", "en": "All cowardice comes from not loving, or not loving well, which is the same thing.", "cn": "所有的怯懦都出自于不爱或爱得不彻底，这两者一样。"}, {"num": "NO.462", "en": "One part of wisdom is knowing what you don't need anymore and letting go.", "cn": "有种智慧是知道自己不需要什么，然后学会放手。"}, {"num": "NO.463", "en": "Regrets about the journey, maybe, but not the destination.", "cn": "也许过程不尽人意，但别为自己有过目标而后悔。"}, {"num": "NO.464", "en": "One of the important things you can do on this earth is to let people know they are not alone.", "cn": "在这世上，你所能做的最重要的事情之一，就是让别人知道他们并不孤单。"}, {"num": "NO.465", "en": "Art washes away from the soul the dust of everyday life.", "cn": "艺术能洗去日常生活覆盖在灵魂上的尘埃。"}, {"num": "NO.466", "en": "From now on, I'm gonna say yes — yes to love, yes to adventure, yes to life.", "cn": "从今天起，我要积极接受一切，接受爱，接受冒险，迎接生活。"}, {"num": "NO.467", "en": "You'll find that life is still worthwhile if you just smile.", "cn": "微笑吧，你会发现，人间依旧值得。"}, {"num": "NO.468", "en": "Everyone wants to be appreciated, so if you appreciate someone, don't keep it a secret.", "cn": "每个人都想被赏识，所以如果你欣赏一个人，别藏在心里。"}, {"num": "NO.469", "en": "Sometimes our light goes out but is blown into flame by another human being.", "cn": "有时我们心中的火焰会熄灭，但当遇到另一个人时，它又再次燃烧起来。"}, {"num": "NO.470", "en": "All your life you wait, and then it finally comes, and are you ready?", "cn": "你的一生都在等待，当所等之事终于到来时，你是否准备好了？"}, {"num": "NO.471", "en": "Love one another, but make not a bond of love: let it rather be a moving sea between the shores of your souls.", "cn": "相爱吧！但别让爱成为羁绊，相反要让爱成为两个灵魂之间涌动的海洋。"}, {"num": "NO.472", "en": "Every flower is a soul blossoming in nature.", "cn": "每朵花都是大自然中绽放的灵魂。"}, {"num": "NO.473", "en": "You are only here for a short visit. Don't hurry, don't worry. And be sure to smell the flowers along the way.", "cn": "你只是到这里作短暂停留而已，不要匆忙，不要忧愁，务必要去感受沿途的花香。"}, {"num": "NO.474", "en": "Time moves in one direction, memory in another.", "cn": "时间向前流逝，而记忆向后延展。"}, {"num": "NO.475", "en": "Life is not merely being alive. but being well.", "cn": "生活不止是活着，而是精彩的活着。"}, {"num": "NO.476", "en": "Only the mediocre are always at their best.", "cn": "只有平庸的人才会永远在他们最好的状态。"}, {"num": "NO.477", "en": "There's much opportunity for one willing to dedicate himself to his labors.", "cn": "愿意付出的人拥有的机会也就更多。"}, {"num": "NO.478", "en": "Integrity is the most valuable and respected quality of leadership. Always keep your word.", "cn": "诚信是最宝贵和最受尊重的领导品质。永远要信守诺言。"}, {"num": "NO.479", "en": "In the end, life teaches us what is important and that is family.", "cn": "生活最终会让我们明白什么最重要，那就是家庭。"}, {"num": "NO.480", "en": "Life is the sum of your choices.", "cn": "你做的所有抉择造就了你的人生。"}, {"num": "NO.481", "en": "Whatever you do, remember: Think higher and feel deeper.", "cn": "不管做什么事，请记住：思考角度要更高，感知要更深刻。"}, {"num": "NO.482", "en": "Without a struggle, there can be no progress.", "cn": "没有奋斗，就没有进步。"}, {"num": "NO.483", "en": "The fruit derived from labor is the sweetest of pleasures.", "cn": "劳动所得的果实是最甜美的。"}, {"num": "NO.484", "en": "In the depth of winter, I finally learned that within me there lay an invincible summer.", "cn": "在隆冬，我终于知道，在我的身体里面，藏着一个无法战胜的夏天。"}, {"num": "NO.485", "en": "It's not the load that breaks you down. it's the way you carry it.", "cn": "把你压垮的不是压力本身，而是你承受压力的方式。"}, {"num": "NO.486", "en": "If you want to lift yourself up, lift up someone else.", "cn": "如果你想提升自己，就先提升别人。"}, {"num": "NO.487", "en": "People are lonely because they build walls instead of bridges.", "cn": "人们之所以孤独，是因为他们筑起的是墙而不是桥。"}, {"num": "NO.488", "en": "One should eat to live, not live to eat.", "cn": "人应为生而食，不应为食而生。"}, {"num": "NO.489", "en": "The only true wisdom is in knowing you know nothing.", "cn": "真正的智慧是知道自己一无所知。"}, {"num": "NO.490", "en": "We are no longer happy so soon as we wish to be happier.", "cn": "在祈求更快乐的那一刻，我们便不再真正快乐。"}, {"num": "NO.491", "en": "Never deprive someone of hope; it might be all they have.", "cn": "千万不要剥夺别人的希望，那可能是他们所拥有的全部。"}, {"num": "NO.492", "en": "In fair weather prepare for foul.", "cn": "宜未雨绸缪。"}, {"num": "NO.493", "en": "Do something today that your future self will thank you for.", "cn": "你今天做的事要让未来的你心存感激。"}, {"num": "NO.494", "en": "Expect the best. Prepare for the worst. Capitalize on what comes.", "cn": "抱最大的希望，做最坏的打算，从结果中学习。"}, {"num": "NO.495", "en": "Forever is composed of nows.", "cn": "永恒是由每一个当下组成的。"}, {"num": "NO.496", "en": "The more things you do. the more you can do.", "cn": "你做的事情越多，能做到的事就越多。"}, {"num": "NO.497", "en": "To know yourself is the first and most important step in pursuing your dreams and goals.", "cn": "了解自己是追求梦想和目标的第一步，也是最重要的一步。"}, {"num": "NO.498", "en": "It's not so much how busy you are, but why you are busy.", "cn": "重要的不是你有多忙，而是为何而忙。"}, {"num": "NO.499", "en": "Every day, in every way, I am getting better and better.", "cn": "每一天，我都在以各种方式变得越来越好。"}, {"num": "NO.500", "en": "The way to get started is to quit talking and begin doing.", "cn": "开始一件事的方法，就是停止说并起身去做。"}, {"num": "NO.501", "en": "You do what's in your heart.", "cn": "跟着你的心走。"}, {"num": "NO.502", "en": "Time waits for no one. Treasure every moment you have.", "cn": "时间不等人，你拥有的每一刻都要珍惜。"}, {"num": "NO.503", "en": "A boy's best friend is his mother.", "cn": "一个男孩最好的朋友是他的母亲。"}, {"num": "NO.504", "en": "One benefit of Summer was that it teaches us to cherish the finest time of the year.", "cn": "夏天的好处之一就是教会了我们要珍惜一年中最美好的时光。"}, {"num": "NO.505", "en": "One benefit of Summer was that each day we had more light to read by.", "cn": "夏天的好处之一就是每天我们有更多的阳光来阅读。"}, {"num": "NO.506", "en": "Before anything else, preparation is the key to success.", "cn": "准备是成功的关键，这比其他任何事情都重要。"}, {"num": "NO.507", "en": "You may be disappointed if you fail, but you are doomed if you don't try.", "cn": "失败可能会让你失望，但若不去尝试，就必定会失败。"}, {"num": "NO.508", "en": "I love you not for who you are, but for who I am with you.", "cn": "我爱你不是因为你是谁，而是我在你面前可以是谁。"}, {"num": "NO.509", "en": "People who live the most fulfilling lives are the ones who are always rejoicing at what they have.", "cn": "永远对所拥有的一切感到欢喜的人，是生活最富足的人。"}, {"num": "NO.510", "en": "The biggest adventure you can take is to live the life of your dreams.", "cn": "你能经历的最大冒险，便是活出你想要的人生。"}, {"num": "NO.511", "en": "Never be limited by other people's limited imaginations.", "cn": "永远不要被别人有限的想象力所限制。"}, {"num": "NO.512", "en": "A journey of a thousand miles begins with a single step.", "cn": "千里之行，始于足下。"}, {"num": "NO.513", "en": "A boy's best friend is. his mother.", "cn": "一个男孩最好的朋友是他的母亲。"}, {"num": "NO.514", "en": "Every moment of light and dark is a miracle.", "cn": "光与夜的每一个时辰都是奇迹。"}, {"num": "NO.515", "en": "Small steps lead to big accomplishments.", "cn": "每次迈出一小步，日积月累也会成就大事。"}, {"num": "NO.516", "en": "All my life through, the new sights of Nature made me rejoice like a child.", "cn": "在我一生中，大自然中的新景象使我像孩子般快乐。"}, {"num": "NO.517", "en": "A single day is enough to make us a little larger, or, another time, a little smaller.", "cn": "一天的时间足以使我们更强大一些，也可以使我们更弱小一些。"}, {"num": "NO.518", "en": "Whoever is happy will make others happy too.", "cn": "快乐的人会让他人也感到快乐。"}, {"num": "NO.519", "en": "Dream big and dare to fail.", "cn": "敢于梦想，不畏失败。"}, {"num": "NO.520", "en": "Great minds discuss ideas; average minds discuss events; small minds discuss people.", "cn": "伟大的头脑谈论思想，普通的头脑谈论事件，浅薄的头脑议论别人。"}, {"num": "NO.521", "en": "Energy and persistence conquer all things.", "cn": "能量加毅力可以战胜一切。"}, {"num": "NO.522", "en": "It seems the harder I work. the more luck I have.", "cn": "我工作愈加努力，似乎就越幸运。"}, {"num": "NO.523", "en": "You can't use up creativity. The more you see and use, the more you have.", "cn": "创造力用之不竭，你见的越多，用的越多，拥有的也就越多。"}, {"num": "NO.524", "en": "Every day brings new choices.", "cn": "每一天都会有新的选择。"}, {"num": "NO.525", "en": "Doubt kills more dreams than failure ever will.", "cn": "比起失败，怀疑自己会扼杀更多的梦想。"}, {"num": "NO.526", "en": "Not being heard is no reason for silence.", "cn": "没有被听见不是沉默的理由。"}, {"num": "NO.527", "en": "Winning isn't everything, but wanting it is.", "cn": "胜利并不能代表一切，而求胜心可以。"}, {"num": "NO.528", "en": "I have not failed. I've just found 10,000 ways that won't work.", "cn": "我没有失败，我只是找到了一万种行不通的方法。"}, {"num": "NO.529", "en": "You can overcome anything. if you love something enough.", "cn": "只要你足够热爱一种事，就可以克服任何困难。"}, {"num": "NO.530", "en": "Never look back unless you are planning to go that way.", "cn": "永远不要回头，除非你想走回头路。"}, {"num": "NO.531", "en": "Everything comes to him who hustles while he waits.", "cn": "等待时也匆忙做事的人，能够得到一切。"}, {"num": "NO.532", "en": "Keep your friends close, but your enemies closer.", "cn": "知己知彼，百战不殆。"}, {"num": "NO.533", "en": "We're beautiful like diamonds in the sky.", "cn": "我们都是夜空中璀璨的钻石。"}, {"num": "NO.534", "en": "You can overcome anything if you love something enough.", "cn": "只要你足够热爱一件事，就可以克服任何困难。"}, {"num": "NO.535", "en": "Business as usual is not really our motto.", "cn": "循规蹈矩不是我们的格言。"}, {"num": "NO.536", "en": "A lantern with no moon is not fun. A moon with no lantern is not spring.", "cn": "有灯无月不娱人，有月无灯不算春。"}, {"num": "NO.537", "en": "Keep your best wishes. close to your heart and watch what happens.", "cn": "一直怀揣着最美的愿望，倾听内心的声音，再看看会发生什么。"}, {"num": "NO.538", "en": "The creation of a thousand forests is in one acorn.", "cn": "上千片森林的形成都源自一颗橡树种子。"}, {"num": "NO.539", "en": "Beauty begins the moment you decide to be yourself.", "cn": "美，从你下决心做自己的那一刻开始。"}, {"num": "NO.540", "en": "I believe the target of anything in life should be to do it so well that it becomes an art.", "cn": "我认为，在生活中，不管做任何事，其目标都是将它做到艺术一般完美。"}, {"num": "NO.541", "en": "Nothing in life is to be feared, it is only to be understood.", "cn": "生活中没有什么东西是可怕的，它们只是需要被理解。"}, {"num": "NO.542", "en": "I alone cannot change the world, but I can cast a stone across the waters to create many ripples.", "cn": "我一人之力并不能改变世界，但我往水面抛一块石头，就能激起许多涟漪。"}, {"num": "NO.543", "en": "Nothing is pleasanter to me than exploring in a library.", "cn": "对我来说，没有什么比探索图书馆更快乐的事情了。"}, {"num": "NO.544", "en": "Sometimes if you want to see a change for the better, you have to take things into your own hands.", "cn": "有时当你想看到自己变得更好的时候，你就必须自己动手付出努力。"}, {"num": "NO.545", "en": "There is no time like spring, when life is alive in everything.", "cn": "再没有什么时节像春天一样，万物复苏，充满生机。"}, {"num": "NO.546", "en": "I think part of my gift — or if I have one — is that I love listening.", "cn": "我觉得我的天赋—如果我有天赋的话—就是我热爱倾听。"}, {"num": "NO.547", "en": "Real change, enduring change, happens one step at a time.", "cn": "真正的改变，持久的变化，都是一步一步完成的。"}, {"num": "NO.548", "en": "The beautiful journey of tomorrow can only begin when we learn to let go of yesterday.", "cn": "学会放过昨天，才能开启明天的美好旅程。"}, {"num": "NO.549", "en": "Spring is nature's way of saying, \"Let's party!\"", "cn": "春天的到来是大自然在说：“来狂欢吧！”"}, {"num": "NO.550", "en": "Genius is not that you are smarter than everyone else. It is that you are ready to receive the inspiration.", "cn": "天才并不是比其他人聪明，而是时刻准备着迎接灵感的到来。"}, {"num": "NO.551", "en": "Life is about making an impact, not making an income.", "cn": "生命在于影响他人，而非赚钱糊口。"}, {"num": "NO.552", "en": "It's faith that will take you through, and determination that will drive you.", "cn": "信念带你渡过难关，决心为你加油鼓劲。"}, {"num": "NO.553", "en": "How wonderful it is that nobody need wait a single moment before starting to improve the world.", "cn": "无需等待就可行动起来，让世界变得更美好——这简直妙不可言。"}, {"num": "NO.554", "en": "Too many of us are not living our dreams because we are living our fears.", "cn": "我们中有太多人没有践行自己的梦想，因为我们活在恐惧中。"}, {"num": "NO.555", "en": "We cannot help everyone, but everyone can help someone.", "cn": "我们不能帮助所有人，但每个人都能帮助到别人。"}, {"num": "NO.556", "en": "If I am walking with two other men, each of them will serve as my teacher.", "cn": "三人行，必有我师焉。"}, {"num": "NO.557", "en": "You can't cross the sea merely by standing and staring at the water.", "cn": "光站在那里盯着海面，是没法穿越海洋的。"}, {"num": "NO.558", "en": "All we have to decide is what to do with the time that is given to us.", "cn": "我们需要决定的是，如何利用好上天赋予我们的时间。"}, {"num": "NO.559", "en": "Life's greatest happiness is to be convinced we are loved.", "cn": "人生最大的幸福，就是确信我们是被人爱着的。"}, {"num": "NO.560", "en": "Love is the one thing that transcends time and space.", "cn": "爱是唯一可以超越时空的东西。"}, {"num": "NO.561", "en": "He who plants a tree, plants a hope.", "cn": "种下一棵树，就是种下一棵希望。"}, {"num": "NO.562", "en": "The golden rule is that there are no golden rules.", "cn": "真正的金科玉律就是世界上并无金科玉律。"}, {"num": "NO.563", "en": "Personality is to a man what perfume is to a flower.", "cn": "个性之于人正如芳香之于花。"}, {"num": "NO.564", "en": "Things turn out best for the people who make the best of the way things turn out.", "cn": "充分利用既有结果的人，就会获得最佳结果。"}, {"num": "NO.565", "en": "Despite the forecast, live like it's spring.", "cn": "无天气预报怎么样，把每天都当成春天来过。"}, {"num": "NO.566", "en": "If the moon smided, she would resemble you.", "cn": "月亮要是笑起来，她就会和你一样。"}, {"num": "NO.567", "en": "The landscape belongs to the person who looks at it.", "cn": "风景属于那些看风景的人。"}, {"num": "NO.568", "en": "We first make our habits, then our habits make us.", "cn": "我们养成习惯，接着习惯成就我们。"}, {"num": "NO.569", "en": "The most profound statements are often said in silence.", "cn": "最深刻的语句往往是在沉默中说出来的。"}, {"num": "NO.570", "en": "We become what we think about.", "cn": "我们思考什么，就会变成什么。"}, {"num": "NO.571", "en": "Look back, and smile on perils past.", "cn": "回首往事，向过去的苦难微笑。"}, {"num": "NO.572", "en": "With great power comes great responsibility.", "cn": "能力越大，责任越大。"}, {"num": "NO.573", "en": "Do what is right, not what is easy nor what is popular.", "cn": "做正确的事，不要做容易的事，也不要随大流。"}, {"num": "NO.574", "en": "The most certain way to succeed is always to try just one more time.", "cn": "保证成功的要诀就是永远都再多试一次。"}, {"num": "NO.575", "en": "The sidelines are not where you want to live your life. The world needs you in the arena.", "cn": "生活不是要你站在边线围观，这个世界需要你参与进来。"}, {"num": "NO.576", "en": "Nothing great was ever achieved without enthusiasm.", "cn": "世上任何伟业的成就都离不开热情。"}, {"num": "NO.577", "en": "There's much opportunity for one willing to dedicate himself to his craft.", "cn": "愿意付出努力的人拥有的机会也就更多。"}, {"num": "NO.578", "en": "No one can make you feel inferior without your consent.", "cn": "未经你的许可，没人能让你妄自菲薄。"}, {"num": "NO.579", "en": "When you reach the end of your rope, tie a knot in it and hang on.", "cn": "哪怕希望快要破灭，也要努力挣扎，坚持下去。"}, {"num": "NO.580", "en": "If the moon smiled, she would resemble you.", "cn": "月亮要是笑起来，她就会和你一样。"}, {"num": "NO.581", "en": "Sometimes you can't see your own beauty until you look through the eyes of others.", "cn": "有时候，透过别人的眼睛才能看清自己。"}, {"num": "NO.582", "en": "Nothing is more highly to be prized than the value of each day.", "cn": "没有什么比每一天的价值更值得被珍视。"}, {"num": "NO.583", "en": "He who has a why to live can bear almost any how.", "cn": "知道为什么而活的人，几乎能忍受任何生存方式。"}, {"num": "NO.584", "en": "The memories we make with our family are everything.", "cn": "我们与家人共创的记忆，重于一切。"}, {"num": "NO.585", "en": "I am not a product of my circumstances. I am a product of my decisions.", "cn": "我并非由环境造就，乃是由我所做出的决定造就。"}, {"num": "NO.586", "en": "The foolish man seeks happiness in the distance, the wise grows it under his feet.", "cn": "愚者追求远方的快乐，智者播种脚下的幸福。"}, {"num": "NO.587", "en": "Action may not always bring happiness, but there is no happiness without action.", "cn": "行动不一定带来快乐，但不行动一定没有快乐。"}, {"num": "NO.588", "en": "If you can't fly then run, if you can't run then walk, if you can't walk then crawl, but whatever you do you have to keep moving forward.", "cn": "如果不能飞那就跑，如果不能跑那就走，如果不能走那就爬，但无论做什么，你都要勇往直前。"}, {"num": "NO.589", "en": "You can't sweep other people off their feet if you can't be swept off your own.", "cn": "如果你自己都不为自己倾倒，别人也不会为你倾倒。"}, {"num": "NO.590", "en": "People grow through experience if they meet life honestly and courageously.", "cn": "如果人诚实，勇敢地面对生活，就能从经历中获得成长。"}, {"num": "NO.591", "en": "The best way out is always through.", "cn": "找到出口的最好方式就是一路走到底。"}, {"num": "NO.592", "en": "It's supposed to be hard. If it wasn't hard, everyone would do it.", "cn": "要做成一件事本来就不容易，要是不难，岂不是谁都会去做？"}, {"num": "NO.593", "en": "Respect other people's feelings. It might mean nothing to you but it could mean everything to them.", "cn": "尊重他人的感受。这对你可能无关紧要，但可能对他人十分重要。"}, {"num": "NO.594", "en": "To know yourself, is the first and most important step in pursuing your dreams and goals.", "cn": "了解自己是追求梦想和目标的第一步，也是最重要的一步。"}, {"num": "NO.595", "en": "Be a first-rate version of yourself, not a second-rate version of someone else.", "cn": "做一流的自己，不做二流的别人。"}, {"num": "NO.596", "en": "Satisfying people's aspirations to lie a better life with technological innovation.", "cn": "用技术创新满足人们对美好生活的向往。"}, {"num": "NO.597", "en": "Good companies make profits. Great companies win over people's hearts.", "cn": "伟大的公司赢得人心，优秀的公司赚取利润。"}, {"num": "NO.598", "en": "The expert in anything was once a beginner.", "cn": "任何领域的专家也曾是一名初学者。"}, {"num": "NO.599", "en": "Wish not so much to live long as to live well.", "cn": "与其希望活得久，不如祈盼过得好。"}, {"num": "NO.600", "en": "Don't live the same year seventy-five times and call it a life.", "cn": "不要75年都过着同样的日子，然后把这叫做人生。"}, {"num": "NO.601", "en": "Not having the best situation, but seeing the best in your situation is the key to happiness.", "cn": "快乐的关键在于，即使境遇不是最佳，但依然能看到处境中最好的一面。"}, {"num": "NO.602", "en": "It's not about how busy you are, but why you are so busy.", "cn": "重要的不是你有多忙，而是你为什么这么忙。"}, {"num": "NO.603", "en": "I see that I'm a little piece of a big big universe, and that makes things right.", "cn": "我明白自己只是浩瀚宇宙中的渺小一员，想通这点，心中便豁然开朗。"}, {"num": "NO.604", "en": "There's much opportunity for one who is willing to dedicate himself to his labors.", "cn": "愿意付出努力的人拥有的机会也就更多。"}, {"num": "NO.605", "en": "We can draw lessons from the past, but we cannot live in it.", "cn": "我们可以从过去汲取经验，但不能活在过去。"}, {"num": "NO.606", "en": "We've all got both light and dark inside us. What matters is the part we choose to act on. That's who we really are.", "cn": "我们心中都有光明和黑暗，但更重要的是我们选择哪一面。这才是我们真正的样子。"}, {"num": "NO.607", "en": "The wisest mind has something yet to learn.", "cn": "再聪慧的人，也仍有新知可学。"}, {"num": "NO.608", "en": "The more things you do, the more you can do.", "cn": "你做的事情越多，能做到的事情就越多。"}, {"num": "NO.609", "en": "I cannot give you the formula for success, but I can give you the formula for failure—which is: try to please everybody.", "cn": "我不能给你成功的公式，但我可以给你失败的公式，那就是：试图取悦每个人。"}, {"num": "NO.610", "en": "Never help a child with a task at which he feels he can succeed.", "cn": "当一个孩子觉得自己能成功完成一项任务时，千万别去帮他。"}, {"num": "NO.611", "en": "The successful warrior is the average man, with laser-like focus.", "cn": "成功的勇士也是普通人，只是他们拥有激光般的专注力。"}, {"num": "NO.612", "en": "Every sweet has its sour; every evil has its good.", "cn": "甘甜有其酸涩，恶人亦有善行。"}, {"num": "NO.613", "en": "Faith doesn't mean you never doubt. It only means you never act upon your doubts.", "cn": "信念并不意味着毫无疑虑，它只意味着你从不带着疑虑行事。"}, {"num": "NO.614", "en": "True life is lived when tiny changes occur.", "cn": "生命中有了细小的变化，才算是真正地活着。"}, {"num": "NO.615", "en": "Difficulties increase the nearer we get to the goal.", "cn": "我们越接近目标，遇到的困难就越多。"}, {"num": "NO.616", "en": "You must remember what you are and what you have chosen to become, and the significance of what you are doing.", "cn": "你必须记得自己是什么人，你选择要成为什么人，记住你正在做的事情的重要意义。"}, {"num": "NO.617", "en": "Firs
